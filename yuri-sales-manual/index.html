<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>松本ゆり セールスレポート</title>
<style>
:root {
  --main: #2CB596; --sub: #189B7D; --bg: #F0FAF8;
  --ink: #243B36; --ink-soft: #5B726B; --line: #D7ECE5; --card: #FFFFFF;
}
* { box-sizing: border-box; }
/* 50代の読者にやさしいよう、基準フォントを大きめ（≒+2pt）に設定。
   各要素は rem 指定なので全体が比例して拡大する。 */
html { font-size: 18px; }
@media (max-width: 720px) { html { font-size: 16.5px; } }
html, body { overflow-x: hidden; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
    "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.95;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}
a { color: var(--sub); text-decoration: none; word-break: break-all; }
a:hover { text-decoration: underline; }

/* ===== 記事カード ===== */
.article {
  background: var(--card);
  border-radius: 18px;
  padding: 3rem 3.2rem 3.5rem;
  box-shadow: 0 8px 30px rgba(24,155,125,0.08);
  border: 1px solid var(--line);
  font-size: 1.05rem;  /* 本文は基準よりさらに気持ち大きく（読みやすさ優先） */
}

/* ===== 見出し ===== */
.article h1 {
  font-size: 1.9rem;
  font-weight: 800;
  line-height: 1.5;
  margin: 0 0 2rem;
  padding: 0 0 1.2rem;
  color: var(--ink);
  border-bottom: 3px solid var(--main);
  position: relative;
}
.article h1::before {
  content: "";
  display: inline-block;
  width: 46px; height: 6px;
  background: linear-gradient(90deg, var(--main), var(--sub));
  border-radius: 6px;
  position: absolute; left: 0; bottom: -4.5px;
}
.article h2 {
  font-size: 1.32rem;
  font-weight: 700;
  color: var(--sub);
  margin: 2.8rem 0 1.1rem;
  padding: 0.55rem 0 0.55rem 1rem;
  border-left: 6px solid var(--main);
  background: linear-gradient(90deg, rgba(44,181,150,0.10), rgba(44,181,150,0));
  border-radius: 0 8px 8px 0;
}
.article h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin: 2rem 0 0.7rem;
  padding-left: 0.85rem;
  border-left: 4px solid var(--line);
}
/* キーワード検出された H3（注意・結論・強み等） */
.article h3.callout-h {
  border-left: none;
  padding: 0.6rem 1rem;
  border-radius: 10px;
  background: var(--bg);
  color: var(--ink);
  display: flex; align-items: center; gap: 0.5rem;
  box-shadow: inset 5px 0 0 var(--bar);
  background: var(--bg);
}
.article h3.callout-h { background: var(--bg); }
.article h3.callout-ico, .callout-ico { font-size: 1.05em; }

.article h4 { font-size: 1rem; font-weight: 700; color: var(--ink-soft); margin: 1.4rem 0 0.5rem; }

/* ===== 本文 ===== */
/* 本文は読みやすい行幅に抑える（見出し・テーブルは全幅のまま＝編集記事的リズム） */
.article p { margin: 1.15rem 0; max-width: 42em; }
.article ul, .article ol { padding-left: 1.4rem; margin: 0.9rem 0; max-width: 42em; }
.article li { margin: 0.5rem 0; }
.article li::marker { color: var(--main); }
.article strong { color: var(--sub); font-weight: 700; }
.article hr { border: none; border-top: 1px dashed var(--line); margin: 2.4rem 0; }
/* 章/小見出し直後の段落をリード文として少し強調 */
.article h2 + p, .article h3 + p { color: var(--ink); }

/* ===== ステップバー（17ステップ照合などの構造化） ===== */
.step {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.6rem 0 0.4rem;
  padding: 0.6rem 0.9rem;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(24,155,125,0.06);
}
.step-no {
  flex: 0 0 auto;
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--main), var(--sub));
  color: #fff; font-weight: 800; font-size: 0.95rem;
  border-radius: 9px;
}
.step-name { flex: 1 1 auto; font-weight: 700; color: var(--ink); font-size: 1.02rem; }
.eval {
  flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 2rem; height: 1.7rem; padding: 0 0.6rem;
  border-radius: 999px; font-weight: 800; font-size: 0.95rem;
}
.eval-ok { background: #E0F4EE; color: #1B8F70; }
.eval-warn { background: #FCF0D9; color: #B07A14; }
.eval-ng { background: #F7DEDB; color: #B0463B; }
/* ステップバー直後の本文を少しインデントして従属関係を見せる */
.step + p { margin-top: 0.55rem; padding-left: 0.2rem; }

/* ===== 成績バッジ（A/B/C/D） ===== */
.grade {
  display: inline-flex; align-items: center; justify-content: center;
  width: 2rem; height: 2rem; border-radius: 9px;
  color: #fff; font-weight: 800; font-size: 1rem;
}

/* ===== テーブル ===== */
.article table {
  border-collapse: separate; border-spacing: 0;
  width: 100%; margin: 1.3rem 0;
  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
  font-size: 0.95rem;
}
.article thead th {
  background: linear-gradient(180deg, var(--main), var(--sub));
  color: #fff; font-weight: 700; text-align: left;
  padding: 0.8rem 0.95rem; border: none;
}
.article tbody td { padding: 0.7rem 0.95rem; border-top: 1px solid var(--line); vertical-align: top; }
.article tbody tr:nth-child(even) { background: rgba(44,181,150,0.045); }
.article tbody tr:hover { background: rgba(44,181,150,0.10); }

/* ===== バッジ（結果ラベル） ===== */
.badge {
  display: inline-block; padding: 0.15rem 0.7rem; border-radius: 999px;
  font-size: 0.85rem; font-weight: 700; white-space: nowrap;
}

/* ===== 注意枠カード（blockquote） ===== */
.callout-box {
  margin: 1.4rem 0; padding: 1.1rem 1.3rem;
  background: #FCF3E6; border-left: 5px solid #E0973E;
  border-radius: 0 12px 12px 0; color: var(--ink);
}
.callout-box p { margin: 0.4rem 0; }

/* ===== コード ===== */
.article code { background: #E6F6F1; color: var(--sub); padding: 0.12rem 0.45rem; border-radius: 5px; font-size: 0.9em; }
.article pre { background: #1f3b35; color: #e7f5f0; padding: 1rem 1.2rem; border-radius: 12px; overflow-x: auto; }
.article pre code { background: none; color: inherit; padding: 0; }
.article a[target="_blank"]::after { content: " ↗"; font-size: 0.78em; color: var(--main); }

/* ===== サイドバー内 案件内ビュー切替（マニュアル⇔月次） ===== */
/* 緑ボタン等で特別扱いせず、普通のサイドバー項目として表示する。
   他項目と差がつきすぎないよう、左に細い帯だけ添える。 */
.sidebar-item--cross {
  margin-top: 0.4rem;
  border-left: 3px solid var(--line);
}
.sidebar-item--cross::before { content: "📅 "; font-size: 0.85em; }

/* ===== 本文中の参照リンク（〇〇.md を参照） ===== */
.article a.ref-link {
  background: #E6F6F1; color: var(--sub);
  padding: 0.1rem 0.5rem; border-radius: 6px;
  font-size: 0.92em; font-weight: 600;
  border-bottom: 1px solid var(--main); word-break: break-all;
}
.article a.ref-link::before { content: "🔗 "; font-size: 0.85em; }

/* ===== 用語集（折りたたみ） ===== */
.article .glossary {
  margin: 2.6rem 0 0; padding: 0.4rem 1.2rem;
  background: #F7FBFA; border: 1px solid var(--line); border-radius: 12px;
}
.article .glossary summary {
  cursor: pointer; font-weight: 700; color: var(--sub);
  padding: 0.7rem 0; font-size: 0.95rem; list-style-position: inside;
}
.article .glossary[open] summary { border-bottom: 1px dashed var(--line); margin-bottom: 0.6rem; }
.article .glossary dl { margin: 0.3rem 0 0.8rem; }
.article .glossary dt { font-weight: 700; color: var(--ink); margin-top: 0.7rem; font-size: 0.95rem; }
.article .glossary dd { margin: 0.15rem 0 0; color: var(--ink-soft); font-size: 0.9rem; line-height: 1.7; }

/* ===== 今月の判定サマリー（月次レポート冒頭の3行） ===== */
.article .verdict {
  margin: 0 0 1.8rem; padding: 1.1rem 1.3rem;
  border-radius: 14px; border: 1px solid var(--line);
  background: #fff; box-shadow: 0 4px 16px rgba(24,155,125,0.07);
}
.article .verdict .v-row { display: flex; gap: 0.7rem; margin: 0.35rem 0; align-items: baseline; }
.article .verdict .v-key { flex: 0 0 6.5em; font-weight: 700; color: var(--sub); font-size: 0.92rem; }
.article .verdict .v-val { flex: 1 1 auto; color: var(--ink); }
.article .verdict.is-good { border-left: 6px solid #2CB596; }
.article .verdict.is-watch { border-left: 6px solid #E0973E; }
.article .verdict.is-bad { border-left: 6px solid #C0584E; }

/* ===== 出典表記（文字壁の緩和） ===== */
/* （出典: 〇〇_分析.md／…）を本文よりはっきり小さく・薄いグレーに沈める。
   情報としては残すが視覚的な主役は本文に戻す。 */
.article .src-cite {
  font-size: 0.72em;
  color: #9FB1AB;
  font-weight: 400;
  letter-spacing: 0;
  line-height: 1.5;
}

/* ===== レイアウト（単一カラム型） ===== */
.content { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.3rem 4rem; overflow-wrap: anywhere; }
@media (max-width: 720px) {
  .content { padding: 1.2rem; }
  .article { padding: 1.6rem 1.3rem 2rem; border-radius: 14px; }
  .article h1 { font-size: 1.5rem; }
}

.idx-list { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.idx-list li { margin: 0; }
.idx-list a {
  display: flex; align-items: baseline; gap: 0.9rem;
  padding: 1rem 1.1rem; margin-bottom: 0.6rem;
  background: #fff; border: 1px solid var(--line); border-radius: 12px;
  color: var(--ink); box-shadow: 0 2px 8px rgba(24,155,125,0.05);
}
.idx-list a:hover { border-color: var(--main); text-decoration: none; transform: translateY(-1px); transition: .15s; }
.idx-list .date { flex: 0 0 auto; font-size: 0.85rem; color: var(--main); font-weight: 700; }
.idx-list .ttl { flex: 1 1 auto; font-weight: 600; }
</style>
</head>

</article>
</main>
