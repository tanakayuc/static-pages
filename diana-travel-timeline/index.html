// Populate country filter
const countries = [...new Set(DATA.map(d => d.c).filter(c => c && c !== "Unknown"))].sort();
const sel = document.getElementById("countryFilter");
countries.forEach(c => {
  const opt = document.createElement("option");
  const flag = DATA.find(d => d.c === c)?.f || "";
  opt.value = c; opt.textContent = flag + " " + c;
  sel.appendChild(opt);
});

function render(filter) {
  let items = DATA;
  if (filter?.country) items = items.filter(d => d.c === filter.country);
  if (filter?.search) {
    const q = filter.search.toLowerCase();
    items = items.filter(d => d.n.toLowerCase().includes(q) || d.ci.toLowerCase().includes(q) || d.c.toLowerCase().includes(q) || d.desc.includes(q));
  }

  const container = document.getElementById("timeline");
  container.innerHTML = "";

  if (!items.length) {
    container.innerHTML = '<div class="no-results">該当するスポットがありません</div>';
    return;
  }

  const years = {};
  items.forEach(d => {
    const y = d.d.slice(0, 4);
    if (!years[y]) years[y] = [];
    years[y].push(d);
  });

  Object.keys(years).sort().forEach(year => {
    const group = document.createElement("div");
    group.className = "year-group";
    const label = document.createElement("div");
    label.className = "year-label";
    label.innerHTML = year + "年 <span class=\"count\">" + years[year].length + "件</span>";
    group.appendChild(label);

    years[year].forEach(d => {
      const url = "https://www.youtube.com/watch?v=" + d.rid;
      const thumb = "https://img.youtube.com/vi/" + d.rid + "/mqdefault.jpg";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<a class="thumb" href="' + url + '" target="_blank" rel="noopener">' +
          '<img src="' + thumb + '" alt="' + d.n + '" loading="lazy">' +
          '<div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' +
        '</a>' +
        '<div class="card-body">' +
          '<div class="loc">' + d.n + '</div>' +
          '<div class="meta"><span class="flag">' + d.f + '</span>' + d.c + (d.ci && d.ci !== d.c && d.ci !== "Unknown" && d.ci !== "Various" ? " / " + d.ci : "") + '  ·  ' + d.d + '</div>' +
          (d.desc ? '<div class="desc">' + d.desc + '</div>' : '') +
          '<a class="link" href="' + url + '" target="_blank" rel="noopener">▶ 動画を見る</a>' +
        '</div>';
      group.appendChild(card);
    });

    container.appendChild(group);
  });
}

// Event handlers
sel.addEventListener("change", () => render({ country: sel.value, search: document.getElementById("searchBox").value }));
document.getElementById("searchBox").addEventListener("input", (e) => render({ country: sel.value, search: e.target.value }));

render();
</script>
