<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなのナレッジ | PLCのAIポータル</title>
<meta name="description" content="PLC受講生向けの投稿・配布リンク・追加要望の入口">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F0FAF8] text-slate-800 min-h-screen antialiased">
<main class="max-w-5xl mx-auto px-5 py-12 sm:py-16">
  <a href="/" class="inline-flex items-center gap-2 text-[#189B7D] font-bold no-underline mb-8">← PLCのAIポータルへ戻る</a>
  <section class="bg-white rounded-3xl border border-emerald-100 shadow-sm p-7 sm:p-10 mb-8">
    <p class="text-[#189B7D] font-extrabold tracking-wide mb-3">PLC AI Portal / Shared Knowledge</p>
    <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-950 leading-tight mb-4">みんなのナレッジ</h1>
    <p class="text-lg sm:text-xl text-slate-600 leading-relaxed">
      投稿、投稿履歴、受講生提供の配布リンク、追加で作ってほしいものを確認する入口です。
    </p>
  </section>

  <section class="grid sm:grid-cols-2 gap-5">
    <a class="block bg-white rounded-2xl border border-slate-200 p-6 no-underline text-inherit hover:-translate-y-1 hover:shadow-lg transition" href="https://docs.google.com/forms/d/e/1FAIpQLSeKj4RK5vswYGRpcRdmzzQ75NiwZpruUAms8jOAyPogna6CJA/viewform">
      <p class="text-sm font-bold text-[#189B7D] mb-2">Submit</p>
      <h2 class="text-2xl font-extrabold text-slate-950 mb-3">投稿する</h2>
      <p class="text-slate-600">共有したいテンプレート、事例、URLを投稿します。</p>
    </a>
    <a class="block bg-white rounded-2xl border border-slate-200 p-6 no-underline text-inherit hover:-translate-y-1 hover:shadow-lg transition" href="https://docs.google.com/spreadsheets/d/1hWHTnW03sga5btHqo5ByhIUuu8WliGORO3WT3etgscc/edit?usp=sharing">
      <p class="text-sm font-bold text-[#189B7D] mb-2">History</p>
      <h2 class="text-2xl font-extrabold text-slate-950 mb-3">投稿履歴を見る</h2>
      <p class="text-slate-600">これまでに集まった投稿や配布リンク候補を確認します。</p>
    </a>
    <a class="block bg-white rounded-2xl border border-slate-200 p-6 no-underline text-inherit hover:-translate-y-1 hover:shadow-lg transition" href="https://docs.google.com/forms/d/e/1FAIpQLSckCawURtaM9Xze-9gMzrGYCR_IOtWIoaO18SOaHYuVSKWZ7w/viewform">
      <p class="text-sm font-bold text-[#189B7D] mb-2">Request</p>
      <h2 class="text-2xl font-extrabold text-slate-950 mb-3">作ってほしいもの</h2>
      <p class="text-slate-600">追加してほしいテンプレート、ツール、解説テーマを送ります。</p>
    </a>
    <a class="block bg-white rounded-2xl border border-slate-200 p-6 no-underline text-inherit hover:-translate-y-1 hover:shadow-lg transition" href="/">
      <p class="text-sm font-bold text-[#189B7D] mb-2">Portal</p>
      <h2 class="text-2xl font-extrabold text-slate-950 mb-3">ポータルへ戻る</h2>
      <p class="text-slate-600">テンプレート集、スキル集、ルール集、田中祐一AIへ戻ります。</p>
    </a>
  </section>
</main>
</body>
</html>
