<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>増田さんファネル分析 HTML比較</title>
<style>
:root {
  --accent: #2CB596;
  --accent-dark: #189B7D;
  --bg: #F0FAF8;
  --text: #10202A;
  --muted: #5F7770;
  --border: #CFEAE4;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
}
main {
  max-width: 980px;
  margin: 0 auto;
  padding: 56px 20px 80px;
}
h1 {
  margin: 0 0 12px;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.25;
}
.lead {
  margin: 0 0 32px;
  color: var(--muted);
  font-size: 1.05rem;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  box-shadow: 0 14px 34px rgba(24, 155, 125, 0.08);
}
.card h2 {
  margin: 0 0 8px;
  font-size: 1.25rem;
}
.card p {
  margin: 0 0 18px;
  color: var(--muted);
}
.links {
  display: grid;
  gap: 10px;
}
a {
  display: block;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent-dark);
  background: #F8FFFD;
  text-decoration: none;
  font-weight: 700;
}
a:hover {
  border-color: var(--accent);
  background: #ECFAF7;
}
</style>
</head>
