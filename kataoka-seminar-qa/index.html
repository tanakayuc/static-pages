<!DOCTYPE html>
<html lang="ja">
<head>

<title>体験セミナー よくあるご質問（過去Q&A集）｜Claude特化型AIコンサルタント養成講座</title>
<style>
:root{--ink:#1a2842;--accent:#ec8400;--bg:#f4f6fa;--rule:#dfe3ea;--softbg:#fef4e6;}
:root{--muted:#5b6270;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif;color:var(--ink);background:var(--bg);line-height:1.95;font-feature-settings:"palt";-webkit-text-size-adjust:100%;}
/* 老眼・50代士業向けに全体的に大きめ */
body{font-size:18px;}
.head{background:var(--ink);color:#fff;padding:40px 20px 34px;text-align:center;}
.head h1{margin:0 0 10px;font-size:27px;font-weight:800;line-height:1.5;}
.head p{margin:0;font-size:15px;color:#cdd6e6;}
.wrap{max-width:900px;margin:0 auto;padding:0 16px 90px;}
.note{background:var(--softbg);border-left:5px solid var(--accent);padding:16px 20px;border-radius:6px;font-size:16px;margin:20px 0;line-height:1.85;}
.controls{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 0 14px;margin-bottom:8px;border-bottom:1px solid var(--rule);}
.controls-inner{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
select,input[type=search]{font-family:inherit;font-size:18px;padding:13px 16px;border:2px solid var(--rule);border-radius:10px;background:#fff;color:var(--ink);outline:none;}
select{min-width:210px;cursor:pointer;}
select:focus,input:focus{border-color:var(--accent);}
input[type=search]{flex:1;min-width:180px;}
.count{font-size:15px;color:var(--muted);margin-left:auto;white-space:nowrap;font-weight:700;}
.toggle{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--muted);cursor:pointer;user-select:none;}
.toggle input{width:18px;height:18px;}
.expand-all{font-size:15px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0;font-family:inherit;text-decoration:underline;font-weight:700;}
.item{background:#fff;border:1px solid var(--rule);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:box-shadow .15s;}
.item:hover{box-shadow:0 4px 18px rgba(20,30,60,.07);}
.q{display:flex;align-items:flex-start;gap:12px;padding:20px 22px;cursor:pointer;font-weight:700;font-size:19px;line-height:1.7;}
.q .tag{flex-shrink:0;font-size:13px;font-weight:700;color:var(--accent);background:var(--softbg);padding:4px 10px;border-radius:12px;white-space:nowrap;margin-top:4px;}
.q .qt{flex:1;}
.q .arw{flex-shrink:0;color:var(--muted);transition:transform .2s;margin-top:4px;font-size:15px;}
.item.open .q .arw{transform:rotate(90deg);}
.a{display:none;padding:0 22px 22px 22px;font-size:17.5px;color:#2a3450;border-top:1px dashed var(--rule);line-height:1.95;}
.item.open .a{display:block;padding-top:18px;}
.a a{color:var(--accent);font-weight:700;text-decoration:underline;text-underline-offset:3px;word-break:break-all;}
.a strong{background:linear-gradient(transparent 62%, rgba(236,132,0,0.22) 62%);}
.a .src{display:inline-block;margin-top:14px;font-size:13px;color:var(--muted);background:var(--bg);padding:4px 10px;border-radius:4px;}
.pending{font-size:13px;font-weight:700;color:#b85042;background:#fbeae7;padding:3px 9px;border-radius:10px;margin-left:8px;}
.empty{text-align:center;color:var(--muted);padding:56px 0;font-size:17px;}
@media(max-width:600px){
 body{font-size:17px;}
 .head h1{font-size:21px;}
 .q{font-size:17px;padding:16px 16px;}
 .a{font-size:16.5px;padding:0 16px 18px;}
 .count{margin-left:0;width:100%;}
 select,input[type=search]{font-size:17px;}
}
@media print{.controls{position:static;}.a{display:block!important;}.arw{display:none;}}
</style>
</head>
<body>
<div class="head">
<h1>体験セミナー よくあるご質問<br>（過去Q&amp;A集）</h1>
<p>Claude特化型AIコンサルタント養成講座 ／ 第1〜7回の質疑から抜粋</p>
</div>
<div class="wrap">
<div class="note">
デモ中・セミナー中に細かいご質問が浮かんだら、まずこちらをご確認ください。それでも残る部分は、入会後のグループコンサルでマンツーマンで深掘りします。<br>
<strong>補助金について</strong>は、監修の園田芽衣さんとのライブ配信が分かりやすいです（カテゴリ「E 補助金」の先頭にリンクがあります）。
</div>
<div class="controls">
<div class="controls-inner">
<select id="catSel"><option value="">すべてのカテゴリ</option></select>
<input type="search" id="q" placeholder="キーワードで検索（例：補助金、価格、未経験）">
<span class="count" id="count"></span>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px;">
<label class="toggle"><input type="checkbox" id="pendChk"> 回答準備中の質問も表示</label>
<button class="expand-all" id="toggleAll">すべて開く</button>
</div>
</div>
<div id="list"></div>
<div class="empty" id="empty" style="display:none;">該当する質問が見つかりませんでした。</div>
</div>
<script>
const DATA=[{"no": 1, "cat": "A 提供内容", "q": "初級・中級・上級で、それぞれどんなコンサル内容ですか？自分の現在地が知りたい。", "a": "3層で提供します。【初級】AIの使い方を教える（単発〜1ヶ月・月5〜10万）／【中級】業務改善の仕組み化（1〜3ヶ月・初期30万前後）／【上級】AI社員・導入支援まで伴走（3〜6ヶ月・100万〜）。最初から大きく狙わず、信頼を積んで上位支援へ進みます。", "src": "第1回", "st": "確定"}, {"no": 2, "cat": "A 提供内容", "q": "Claudeの使い方を社内に教える型と、AI社員として仕組み化して渡す型（クライアントは触らない）、どちらのイメージ？", "a": "基本は『仕組み化して渡す＋伴走』です。経営者は要件を言葉で伝えるだけ。音声入力が基本で、バリバリPCを使わなくてOK。三重の塾の例では学習アプリを2時間で完成、経営者は要件を伝えるだけでした。", "src": "第2回／第5回", "st": "確定"}, {"no": 3, "cat": "A 提供内容", "q": "成果物をこちらが受ける（代行する）のではなく、クライアントにやり方を教えるサポート、という理解で合っていますか？", "a": "その通りです。作業を代行する受託ではなく、やり方を教えて現場で使える状態まで伴走するコンサルです。コンサルが作業を巻き取ってしまうと、ただの契約社員になってしまいます。", "src": "第5回", "st": "確定"}, {"no": 4, "cat": "A 提供内容", "q": "AI社員を擬人化（名前・性格を与える）するのは、顧客に刺さるからですか？", "a": "刺さりやすさに加えて、役割を明確にして動かしやすくする狙いです。1フォルダ内にClaude Codeが動く領域を作り、秘書・経理・ライター等の人格と役割を振ります。役割分担だけの設計でも問題ありません。", "src": "第2回／第7回", "st": "確定"}, {"no": 5, "cat": "A 提供内容", "q": "受注後はAI社員を作って納品する受託開発のイメージ？単価設定がイメージできません。", "a": "受託開発（作って納品して終わり）ではありません。導入後も現場で使えるよう伴走し、次の課題も解決していくコンサルタントの顧問契約です。システム納品代ではなく、人件費削減などの『価値』に対して高単価・継続で契約いただけます。", "src": "よくある質問⑧", "st": "確定"}, {"no": 6, "cat": "I デモ・AI社員の作り方", "q": "AI社員は1つのフォルダに複数入れる？成果物（アウトプット）の構成はどう指定する？", "a": "1つのフォルダの中にClaude Codeが動く領域を作り、その中に役割（人格）を振っていきます。成果物（アウトプット）は、ウェブサイト・スライド・CSV・スプレッドシートなど用途ごとに指定します（例：シフトはスプレッドシートに出力）。※技術的な詳細は入会後のグループコンサルでマンツーマンで深掘りします。", "src": "第7回", "st": "確定"}, {"no": 7, "cat": "A 提供内容", "q": "デモを見せるのと、クライアント先で同様に支援することは多いですか？", "a": "デモで信頼を取ってから導入支援に入ります。会社ごとのルールに合わせて落とし込むのが腕の見せ所で、その伴走こそが価値になります。", "src": "第7回", "st": "確定"}, {"no": 8, "cat": "I デモ・AI社員の作り方", "q": "シフト表などは、最終的にどこまで自動化できますか？（作る／作り方を伝える／アプリ化）", "a": "段階によります。デモではスプレッドシートにシフト表を出力しますが、アプリ化すれば、社員・バイトが希望を入力すると自動でシフト表がアウトプットされる状態まで作れます。社長や責任者が何もしなくても回る形にできます。どこまでやるかは契約段階（初級〜上級）で調整します。", "src": "第7回", "st": "確定"}, {"no": 9, "cat": "B スキル・レベル", "q": "AIのスキルはどこまで身につく？自分でツールを作れないと売る商品がないのでは？", "a": "『作ってあげる作業』が主目的ではありません。発想・提案する側に立つ講座です。社長はAIレベル0なので、あなたがレベル3〜4あれば十分『教える側』になれます。", "src": "第1回", "st": "確定"}, {"no": 10, "cat": "B スキル・レベル", "q": "自分のAIスキルで足りるか不安です。", "a": "レベル3で十分です。社長さんはAIレベル0なので、3でも先生になれます。むしろ最先端を知りすぎている人より、相手の言葉に翻訳できる“通訳”ができる人が勝ちます。片岡自身も最先端は追っていません。そして大事なのは『全員で勝つ』こと。自分一人で全部できなくても、技術が得意な仲間に振りながら、みんなで助け合って成長していける設計です。", "src": "第6回", "st": "確定"}, {"no": 11, "cat": "B スキル・レベル", "q": "AIの知識はどれくらい必要ですか？", "a": "プロレベルは不要です。社長はレベル0なので、あなたがレベル3〜4あれば十分『教える側』に立てます。要件を整理して、技術的に難しい部分は仲間（技術が得意な受講生）に振る働き方も可能です。だから『技術を極めてから』ではなく、今のレベルで始められます。", "src": "第6回／第7回", "st": "確定"}, {"no": 12, "cat": "B スキル・レベル", "q": "AI未経験でも大丈夫ですか？", "a": "大丈夫です。講座はAI未経験を前提に設計しています。見せ方と順番のテンプレートをお渡しするので、迷わず取り組めます。社長さんもどうせレベル0なので、完璧な知識より『一緒に困りごとを解決していく姿勢』のほうが大事。学ぶ気持ちと実行があれば、十分に成果につながります。", "src": "よくある質問①", "st": "確定"}, {"no": 13, "cat": "B スキル・レベル", "q": "全く経験のない業界でも、経営者の悩みを理解してAI提案できるか不安です。", "a": "片岡自身も知らない業界はあります。用意したヒアリングシートに沿って質問すれば、向こうから『実はこれが大変で…』と隠れた課題が出てきます。業界知識より聞き方の型です。", "src": "第7回", "st": "確定"}, {"no": 14, "cat": "C 営業・集客", "q": "リアルで既存顧客がいないのですが、対面で新規獲得するコツはありますか？", "a": "6つの販路（交流会・名刺術・Facebook・チラシ・ミニイベント・フォーム営業）があります。中でも交流会とフォーム営業が有効。コンサル型構造トークの順番（売り込まない→質問で整理→気づかせる→提案）を守れば、売り込まずに受注できます。", "src": "第2回", "st": "確定"}, {"no": 15, "cat": "C 営業・集客", "q": "興味を持ってもらいアポが取れるまで、何人くらいに出会う必要がありますか？（目安）", "a": "明確な人数より『接触回数』が鍵です。信頼＝人柄×接触回数。対面・Zoom・チラシ・名刺などで接触を重ねるほど信頼が積み上がり、アポにつながります。", "src": "第5回", "st": "確定"}, {"no": 16, "cat": "C 営業・集客", "q": "営業や交流会が苦手・口下手でも大丈夫ですか？交流会への参加は必須ですか？", "a": "気合いと根性の営業は不要です。自動フォーム営業ツール（KatsuoReach）やチラシで、顔を合わせなくても集客できます。交流会は必須ではありません。", "src": "よくある質問⑥／第7回", "st": "確定"}, {"no": 17, "cat": "C 営業・集客", "q": "営業トーク・刺さるピッチ・『契約したい』と言わせる方法を知りたい。", "a": "7ステップ（名刺→自己紹介トーク→交流会で興味→信頼構築→課題ヒアリング→AI社員提案→デモで契約）と、コンサル型構造トークを講座で型としてお渡しします。ロープレ練習会もあります。", "src": "第7回", "st": "確定"}, {"no": 18, "cat": "C 営業・集客", "q": "コンサルと製作（受託作業）の追加料金は分けるべき？流れで手伝わされないか不安。", "a": "最初にちゃんと切り分けを伝えるのが鉄則です。1日中作業を手伝うのはコンサルではなく契約社員になってしまう。範囲・費用を最初に明確にしましょう（講座で契約書の型も提供）。", "src": "第7回", "st": "確定"}, {"no": 19, "cat": "C 営業・集客", "q": "社長だけでなく現場担当者も紹介され、パッケージにしきれない悩みがあります。", "a": "決済権者でないと導入ハードルは上がります。大きい会社で部署長に決済権があれば別ですが、現場担当者ベースだと難しい場面も。相手の決済権を見極めるのがポイントです。", "src": "第7回", "st": "確定"}, {"no": 20, "cat": "D 価格・お金", "q": "コンサルの月額・サービス価格はどう決めればいい？", "a": "相場ではなく『自分がいくら必要か』から逆算します。月100万・年1000万を目標にするなら、そこから単価を設計し、それでも買ってくれるお客様を探す、という考え方です。片岡のクライアントのサロン系では、周りが5,000〜6,000円のところを1時間1万5,000〜1万8,000円でやっている方もいますが、売上は下がっていません。『どこがいくらだから』と相場を読むのではなく、必要な額から決めて、その価値を届けるのが大事です。", "src": "第7回", "st": "確定"}, {"no": 21, "cat": "D 価格・お金", "q": "月50万のコンサルフィーが取れるイメージが付きません。", "a": "段階的です。最初は補助金やスポット支援で40万前後の単発→継続支援で月5万→信頼が乗れば月15〜30万。いきなり月50万を狙う話ではありません。", "src": "第5回", "st": "確定"}, {"no": 22, "cat": "D 価格・お金", "q": "『高い』と言われた時のROIの考え方・返し方は？", "a": "『補助金が1件通れば実質負担はこれくらい。さらに毎月これに使っている時間を時給換算すると3ヶ月で元が取れます』と返します。価格でなく回収で見てもらいます。", "src": "第5回", "st": "確定"}, {"no": 23, "cat": "D 価格・お金", "q": "クライアントに導入後、Claude APIなどのランニングコストが心配になりませんか？", "a": "ほぼネックになりません。事前に『AIで浮く人件費・時間』と『APIコスト』を天秤にかけて提案するため、コスト以上のリターンが明確に見え、社長も納得して導入します。", "src": "よくある質問⑧", "st": "確定"}, {"no": 24, "cat": "D 価格・お金", "q": "受講に必要なClaude Codeは無料で大丈夫ですか？", "a": "無料プランはありません。月20〜200ドルの有料プランが必要で、受講料とは別にご自身で契約いただきます。事業投資としてお考えください。", "src": "第7回", "st": "確定"}, {"no": 25, "cat": "D 価格・お金", "q": "クライアントへの提案は、一括払いとサブスク契約のどちらを勧めるのがおすすめ？", "a": "まず初期費用（イニシャル）をいくらか頂いて一定期間やってもらい、その後どうするか相談して継続（月額）に持っていくのが片岡の基本スタイルです。最初から純粋なサブスクだと単価が低くなりがち。おすすめは『初期費用＋継続』の組み合わせです。", "src": "第6回", "st": "確定"}, {"no": 26, "cat": "F サポート", "q": "どんなコミュニティに入るのですか？", "a": "30〜40名規模で、地域がかぶらないように調整しています。情報を隠す必要がなく案件を見せ合える仲間。月2回のグループコンサルで片岡が直接対応するので『入って放置』にはなりません。", "src": "第5回", "st": "確定"}, {"no": 27, "cat": "F サポート", "q": "動画学習ではなく、グルコン・AIセミナーで学ぶ講座という理解で合っていますか？先行スタートでは何ができますか？", "a": "はい、グループコンサル・AIセミナー・トーク練習会が中心で、アーカイブも提供します。先行スタートでは決済者から順次Chatworkグループに招待し、テンプレートやコンテンツを先行公開します。", "src": "第2回", "st": "確定"}, {"no": 28, "cat": "F サポート", "q": "クライアント側でやってもらう作業は何がありますか？並走の労力イメージが持てません。", "a": "経営者は要件を言葉で伝えるだけ。音声入力が基本で、バリバリPCを使う必要はありません。現場の負担は最小限に設計します。", "src": "第5回", "st": "確定"}, {"no": 29, "cat": "F サポート", "q": "Chatworkで添削はしてもらえますか？", "a": "あります。商談前相談・提案書レビュー・SOS相談など、日常的に相談できる体制です。", "src": "第2回", "st": "確定"}, {"no": 30, "cat": "G 参加条件", "q": "講座の開始はいつからですか？", "a": "7月からです。先行決済いただいた方には、6月のうちからスタートダッシュ用のコンテンツ・テンプレートを順次提供します。", "src": "第2回", "st": "確定"}, {"no": 31, "cat": "G 参加条件", "q": "年齢制限はありますか？（30代中盤です）", "a": "年齢制限はありません。むしろ50代以上は対面で信用になりますが、年齢を問わず参加いただけます。", "src": "第2回", "st": "確定"}, {"no": 32, "cat": "G 参加条件", "q": "地方に住んでいますが問題ないですか？", "a": "むしろ地方のほうがチャンスです。ネットの全国大会ではなく、競合が少ない地方の対面市場で戦えます。", "src": "よくある質問②", "st": "確定"}, {"no": 33, "cat": "G 参加条件", "q": "本業が忙しいのですが両立できますか？", "a": "月1回のセミナーと月2回のグルコンなので両立できます。アーカイブ提供・チャット質問もあり、週末や夜の時間で参加可能です。", "src": "よくある質問③", "st": "確定"}, {"no": 34, "cat": "G 参加条件", "q": "すべて対面で、毎回クライアント先へ訪問して実務するのですか？", "a": "最初の出会い・信頼構築はリアルがおすすめですが、その後の商談（デモ）や実務サポートはZoom等で完結できるハイブリッド型です。全国どこでも自分のペースで働けます。", "src": "よくある質問⑦", "st": "確定"}, {"no": 35, "cat": "G 参加条件", "q": "会社員は平日日中に動きにくいです。土曜開催や副業は可能ですか？", "a": "事業者なら平日でOK。会社員の副業の場合、副業可の会社や土曜営業の会社が対象になりやすいです。副業禁止の会社は難しい面があります。", "src": "第7回", "st": "確定"}, {"no": 36, "cat": "G 参加条件", "q": "個人でも（法人でなくても）事業として登録・活動できますか？", "a": "片岡自身は実務に詳しくないものの、専門家いわく個人事業でも対応できる『裏技』があるとのこと。登録のサポートも専門家チームが行います（※詳細は専門家セミナーで確認できます）。", "src": "第7回", "st": "確定"}, {"no": 37, "cat": "G 参加条件", "q": "家族に相談してから決めたいのですが…", "a": "相談は大歓迎です。ご家族と話したうえで面談＆相談にお越しください。地域枠は30万人につき1名で考えており、埋まる前にご相談いただければと思います。", "src": "よくある質問④", "st": "確定"}, {"no": 38, "cat": "G 参加条件", "q": "各県3名までと書いてありますが、まだ気にしなくてよいですか？", "a": "早い方が枠を確保できます。同じ地域のライバルを増やさないためにも、気になる方は面談だけでも先に申し込んでおくのがおすすめです。", "src": "第7回", "st": "確定"}, {"no": 39, "cat": "H ツール", "q": "ChatGPTなど他のAIを使っていますが、Claudeである必要はありますか？", "a": "最終的に社長の悩みが解決できればツールは何でもいいのですが、プログラミング知識ゼロで実務に使える『AI社員』を構築するには、現状コーディング能力が圧倒的に高いClaude（Claude Code）が最適解。だからこそ明確な差別化になります。", "src": "よくある質問⑧", "st": "確定"}, {"no": 40, "cat": "C 営業・集客", "q": "『誰に頼めばいいか分からない・何を聞けばいいかも分からない』という社長を、どう相談につなげますか？", "a": "AIコンサルの役割は、実業の社長とAIの間に入って目線を合わせる『通訳』です。名刺→自己紹介トーク→交流会で興味→課題ヒアリング→デモ提示、の流れで自然に相談を起こします。", "src": "第7回", "st": "確定"}, {"no": 41, "cat": "D 価格・お金", "q": "クライアントに『無料プランでは足りない』ことを、どう説明すればいい？", "a": "Claude Codeに無料プランはなく、最低でも月20ドル等の有料プランが必要です。『これは事業投資です』とはっきり伝えます。AIで浮く人件費・時間とコストを天秤にかければ納得いただけます。", "src": "第7回", "st": "確定"}, {"no": 42, "cat": "C 営業・集客", "q": "AI社員を納品した後、その先の課題はどうやって炙り出しますか？", "a": "ヒアリングの型があります。用意したヒアリングシートで業務を棚卸しすると、向こうから次の課題が出てきます。そこへ継続提案をしていくことで、顧問契約が続いていきます。", "src": "第7回", "st": "確定"}, {"no": 43, "cat": "A 提供内容", "q": "ローカル＋AIで回すソフトを作るのか、エージェント指導なのか、提供範囲の住み分けは？", "a": "基本は『作業を受ける（受託）』のではなく、できるように伴走するコンサルです。開発・制作そのものを依頼された場合は、コンサルとは別料金として切り分けます。", "src": "第7回", "st": "確定"}, {"no": 44, "cat": "I デモ・AI社員の作り方", "q": "AI社員の役割分担は、具体的にどう設計しますか？", "a": "窓口役（秘書）が依頼を全部受けて、内容に応じて専門のAIに振る構成です。片岡のデモでは、秘書／ライター／マーケ・リサーチ／経理／デザイン・コーディング／シフト管理…と役割ごとにエージェントを分けています。", "src": "第7回", "st": "確定"}, {"no": 45, "cat": "I デモ・AI社員の作り方", "q": "AI社員に『人格・役割』を与えるのはなぜ？", "a": "1人1人に『あなたの仕事はこれ』と人格・役割を決めてあげないと、うまく動いてくれません。『勝手に走るな』といった制御も指定します。この“仕込み”が動作の精度を左右する重要なポイントです。クライアントごとに会社のルールが違うので、導入時にそこを整えるのが腕の見せどころです。", "src": "第7回", "st": "確定"}, {"no": 46, "cat": "I デモ・AI社員の作り方", "q": "デモはどのツールで、どう作っていますか？（Claude Codeの使い方）", "a": "Claude Codeを使っています。使い方は大きく4つ（①命令文で直接 ②デスクトップアプリ ③Web ④表面にUIを付ける）。深く知らなくても、まずは自分で1つ作れる状態を目指せばOKです。最先端の知識は不要です。", "src": "第7回", "st": "確定"}, {"no": 47, "cat": "I デモ・AI社員の作り方", "q": "デモの精度は？読み取れない箇所が出た時はどうなりますか？", "a": "写真のレシート等で読み取れない部分は、AI側が『ここは不明です』とチェックして教えてくれます。片岡も最初は二重計上などの失敗をしましたが、指示を調整すれば直せます。完璧を狙うより、まず“見せられる形”にするのが先です。", "src": "第7回", "st": "確定"}, {"no": 48, "cat": "E 補助金", "q": "補助金について詳しく知りたい（動画で見たい）", "a": "補助金は、監修の園田芽衣さん（補助金支援総額5億円超）と田中のライブ配信を見ていただくのが一番わかりやすいです。基本の考え方から、コンサルとしての活用、申請の流れまで1時間にまとまっています。<br><a href=\"https://www.youtube.com/watch?v=Wasd6_LAkt4\" target=\"_blank\" rel=\"noopener\">▶ 補助金最前線セミナー（園田芽衣さん×田中／動画）</a>", "src": "補助金ライブ", "st": "確定"}, {"no": 49, "cat": "E 補助金", "q": "そもそも補助金とは？難しそうで、自分には関係なさそうなのですが…", "a": "園田さんいわく、補助金は『国が出している“クーポン券”』。使わないと損で、受け取り方を知っている人だけが活用しています。日本の中小企業で実際に使っているのは約11%、しかもその9割がリピーター。同じ人がずっと使い、知らない人はずっと自己負担、という差が出ます。返済不要で受け取れるので、まず“使えるものがある”と知るのが第一歩です。<br><a href=\"https://www.youtube.com/watch?v=Wasd6_LAkt4\" target=\"_blank\" rel=\"noopener\">▶ 補助金最前線セミナー（園田芽衣さん×田中／動画）</a>", "src": "補助金ライブ", "st": "確定"}, {"no": 50, "cat": "E 補助金", "q": "補助金・助成金・給付金の違いは？", "a": "大きく3つに分かれます。【補助金】経済産業省が窓口。販路拡大・業務効率化などビジネス系。一定数は審査で落ちます。【助成金】厚生労働省が窓口。雇用・賃上げなど。条件を満たせば原則みんなが受け取れます。【給付金】市町村窓口で、国民全員が対象のものも。いずれも共通して『返済不要』です。提案の順番としては、落ちない“助成金”のほうが優位になります。", "src": "補助金ライブ", "st": "確定"}, {"no": 51, "cat": "E 補助金", "q": "AI導入に使える補助金はありますか？（旧・IT導入補助金）", "a": "あります。以前の『IT導入補助金』が今は『AI補助金』に名前が変わっています。補助率は2/3〜3/4（約60〜75%）。ただし、提供側（あなたの会社）が事前に『ベンダー登録』をしてカタログに商品を載せておく必要があります。登録しておけば、ユーザーがそれを選んで買うときに補助が使えます。Claude Codeのようなツールも、初期設定や使い方指導をパックにしてランニングコストを包括すれば対象にできます（最大2年分のランニングが対象になることも）。", "src": "補助金ライブ／第7回", "st": "確定"}, {"no": 52, "cat": "E 補助金", "q": "補助金の知識がない自分でも提案できますか？社労士・行政書士がいないと無理では？", "a": "必要ありません。今年から、補助金は行政書士、助成金は社会保険労務士が“代理申請・代理作成”の窓口とされています。ただし私たちは『代理で書かない』立場で動きます。<strong>社長ご自身に申請していただき、Zoomで画面共有しながら一緒に作るポジション</strong>なら、こうした士業の先生がいなくてもサポートできます。電子申請が主流なので、添付ミスなどもその場で確認しながら進められます。園田さんのチームにも相談できるので安心です。<br><a href=\"https://www.youtube.com/watch?v=Wasd6_LAkt4\" target=\"_blank\" rel=\"noopener\">▶ 補助金最前線セミナー（園田芽衣さん×田中／動画）</a>", "src": "補助金ライブ", "st": "確定"}, {"no": 53, "cat": "E 補助金", "q": "自分で申請するのと、プロに頼むのは何が違いますか？", "a": "『審査側の目線が分かるかどうか』です。同じAI（ChatGPT等）で事業計画を書いても、プロが書かせる内容と素人が書く内容では完成度が全く違います。特に差が出るのが『新規性』と『再現性』。自分で作って、プロに添削してもらうだけでも採択精度は上がります。講座では園田さん監修のツール（“にゃーご”）で、通常40時間かかる事業計画を1時間ほどで作れる仕組みも使えます。", "src": "補助金ライブ", "st": "確定"}, {"no": 54, "cat": "E 補助金", "q": "補助金が使える提案は、最初から言ったほうがいいですか？", "a": "言ったほうがいいです。『補助金を使ってお手伝いします』と最初から伝えると、お金のハードルがグッと下がります。社長さんはお得な話が好きなので、初めから出してOK。園田さんいわく、補助金対象だと伝えるだけで、『キャッシュフローが…』『家族に相談が…』といった断り文句を一掃できる“裏技”になります。100万円の商品が実質40万円で買える、といった見せ方ができるからです。", "src": "補助金ライブ／第7回", "st": "確定"}, {"no": 55, "cat": "E 補助金", "q": "補助金コンサルの報酬・手数料の相場は？", "a": "一般には『着手金＋成功報酬』が基本です（成功報酬20〜30%という話もあります）。顧問契約なら固定費＋成功報酬で、申請を出すほどボーナスのように積み上がります。なお、講座のリサーチツールと専門家相談は期間中“無料”で使え、自分で作って添削してもらう形なので、別途の手数料はかかりません。", "src": "補助金ライブ／第5回", "st": "確定"}, {"no": 56, "cat": "E 補助金", "q": "一人企業家（個人）でも補助金は使えますか？", "a": "1人企業家はやや絞りづらい面はありますが、今年はラッキーで、予算が2段階で上乗せされており、創業し立てでも使えるものが増えています。個人向け・法人向けで種類が分かれるので、ツールでリサーチ＋専門家に確認するのがおすすめです。物価高・賃上げ対策の枠も各自治体で出ています。", "src": "補助金ライブ／第7回", "st": "確定"}, {"no": 57, "cat": "E 補助金", "q": "補助金のお金の流れ（受け取りのタイミング）はどうなりますか？", "a": "制度上は『一括前払い』です。採択されたらそのまま受注となり、代金もいただけるのでコンサルとしては安心です。お客様側は、支払い後に実績報告を出すと国からお金が戻る仕組みなので、最終的な持ち出しは小さくなります。", "src": "補助金ライブ", "st": "確定"}, {"no": 58, "cat": "E 補助金", "q": "補助金は一定数“落ちる”と聞きました。リスクはありますか？", "a": "補助金は審査があり一定数は落ちます。一方、助成金は条件を満たせば原則受け取れます。なので園田さんは、まず“落ちない助成金”で条件を満たせるかを確認し、それから補助金の提案に進む、という順番を勧めています。通ると思って投資したのに対象外だった、という事故を避けるためです。", "src": "補助金ライブ", "st": "確定"}];const CATS=["A 提供内容", "I デモ・AI社員の作り方", "B スキル・レベル", "C 営業・集客", "D 価格・お金", "E 補助金", "F サポート", "G 参加条件", "H ツール"];
const listEl=document.getElementById('list'),catSel=document.getElementById('catSel'),qInput=document.getElementById('q'),countEl=document.getElementById('count'),pendChk=document.getElementById('pendChk'),emptyEl=document.getElementById('empty'),toggleAllBtn=document.getElementById('toggleAll');
let allOpen=false;
CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);});
function render(){
  const cat=catSel.value,kw=qInput.value.trim(),showPend=pendChk.checked;
  listEl.innerHTML='';let n=0;
  DATA.forEach(d=>{
    if(d.st==='要確認'&&!showPend)return;
    if(cat&&d.cat!==cat)return;
    if(kw&&!(d.q.includes(kw)||d.a.includes(kw)))return;
    n++;
    const item=document.createElement('div');item.className='item'+(allOpen?' open':'');
    const pend=d.st==='要確認'?'<span class="pending">回答準備中</span>':'';
    const ans=d.st==='要確認'?'（事務局で正式回答を準備中です）':d.a;
    item.innerHTML=`<div class="q"><span class="tag">${d.cat.split(' ')[0]}</span><span class="qt">${d.q}${pend}</span><span class="arw">▶</span></div>`+
      `<div class="a">${ans}<br><span class="src">出典：${d.src}</span></div>`;
    item.querySelector('.q').addEventListener('click',()=>item.classList.toggle('open'));
    listEl.appendChild(item);
  });
  countEl.textContent=n+'件';emptyEl.style.display=n===0?'block':'none';
}
catSel.onchange=render;qInput.oninput=render;pendChk.onchange=render;
toggleAllBtn.onclick=()=>{allOpen=!allOpen;toggleAllBtn.textContent=allOpen?'すべて閉じる':'すべて開く';render();};
render();
</script>
