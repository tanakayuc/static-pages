<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体験セミナー よくあるご質問（過去Q&A集）｜Claude特化型AIコンサルタント養成講座</title>
<style>
:root{--ink:#1a2842;--accent:#ec8400;--soft:#ec8400;--bg:#f4f6fa;--rule:#e6e8ee;--muted:#6a7180;--softbg:#fef4e6;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif;color:var(--ink);background:var(--bg);line-height:1.8;font-feature-settings:"palt";}
.head{background:var(--ink);color:#fff;padding:36px 20px 30px;text-align:center;}
.head h1{margin:0 0 8px;font-size:22px;font-weight:800;line-height:1.45;}
.head p{margin:0;font-size:13px;color:#cdd6e6;}
.wrap{max-width:880px;margin:0 auto;padding:0 16px 80px;}
.controls{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 0 12px;margin-bottom:8px;border-bottom:1px solid var(--rule);}
.controls-inner{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
select,input[type=search]{font-family:inherit;font-size:15px;padding:10px 14px;border:1.5px solid var(--rule);border-radius:8px;background:#fff;color:var(--ink);outline:none;}
select{min-width:180px;cursor:pointer;}
select:focus,input:focus{border-color:var(--accent);}
input[type=search]{flex:1;min-width:160px;}
.count{font-size:13px;color:var(--muted);margin-left:auto;white-space:nowrap;}
.toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none;margin-top:4px;}
.note{background:var(--softbg);border-left:4px solid var(--accent);padding:12px 16px;border-radius:4px;font-size:13px;margin:16px 0;color:var(--ink);}
.item{background:#fff;border:1px solid var(--rule);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s;}
.item:hover{box-shadow:0 4px 16px rgba(20,30,60,.06);}
.q{display:flex;align-items:flex-start;gap:10px;padding:16px 18px;cursor:pointer;font-weight:700;font-size:15.5px;}
.q .tag{flex-shrink:0;font-size:11px;font-weight:700;color:var(--accent);background:var(--softbg);padding:3px 8px;border-radius:10px;white-space:nowrap;margin-top:2px;}
.q .qt{flex:1;}
.q .arw{flex-shrink:0;color:var(--muted);transition:transform .2s;margin-top:2px;font-size:13px;}
.item.open .q .arw{transform:rotate(90deg);}
.a{display:none;padding:0 18px 18px 18px;font-size:15px;color:#2c3650;border-top:1px dashed var(--rule);margin-top:0;}
.item.open .a{display:block;padding-top:14px;}
.a .src{display:inline-block;margin-top:10px;font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:3px;}
.pending{font-size:11px;font-weight:700;color:#b85042;background:#fbeae7;padding:3px 8px;border-radius:10px;margin-left:6px;}
.empty{text-align:center;color:var(--muted);padding:48px 0;font-size:14px;}
.expand-all{font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0;font-family:inherit;text-decoration:underline;}
@media(max-width:600px){.head h1{font-size:18px;}.q{font-size:14.5px;}.count{margin-left:0;width:100%;}}
@media print{.controls{position:static;}.a{display:block!important;}.arw{display:none;}}
</style>
</head>
<body>
<div class="head">
<h1>体験セミナー よくあるご質問<br>（過去Q&amp;A集）</h1>
<p>Claude特化型AIコンサルタント養成講座 ／ 第1〜7回の質疑から抜粋</p>
</div>
<div class="wrap">
<div class="note">
デモ中・セミナー中に細かいご質問が浮かんだら、まずこちらをご確認ください。それでも残る部分は、入会後のグループコンサルでマンツーマンで深掘りします。
</div>
<div class="controls">
<div class="controls-inner">
<select id="catSel"><option value="">すべてのカテゴリ</option></select>
<input type="search" id="q" placeholder="キーワードで検索（例：補助金、価格、未経験）">
<span class="count" id="count"></span>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
<label class="toggle"><input type="checkbox" id="pendChk"> 回答準備中の質問も表示</label>
<button class="expand-all" id="toggleAll">すべて開く</button>
</div>
</div>
<div id="list"></div>
<div class="empty" id="empty" style="display:none;">該当する質問が見つかりませんでした。</div>
</div>
<script>
const DATA = [{"no": 1, "cat": "A 提供内容", "q": "初級・中級・上級で、それぞれどんなコンサル内容ですか？自分の現在地が知りたい。", "a": "3層で提供します。【初級】AIの使い方を教える（単発〜1ヶ月・月5〜10万）／【中級】業務改善の仕組み化（1〜3ヶ月・初期30万前後）／【上級】AI社員・導入支援まで伴走（3〜6ヶ月・100万〜）。最初から大きく狙わず、信頼を積んで上位支援へ進みます。", "src": "第1回", "st": "確定"}, {"no": 2, "cat": "A 提供内容", "q": "Claudeの使い方を社内に教える型と、AI社員として仕組み化して渡す型（クライアントは触らない）、どちらのイメージ？", "a": "基本は『仕組み化して渡す＋伴走』です。経営者は要件を言葉で伝えるだけ。音声入力が基本で、バリバリPCを使わなくてOK。三重の塾の例では学習アプリを2時間で完成、経営者は要件を伝えるだけでした。", "src": "第2回／第5回", "st": "確定"}, {"no": 3, "cat": "A 提供内容", "q": "成果物をこちらが受ける（代行する）のではなく、クライアントにやり方を教えるサポート、という理解で合っていますか？", "a": "その通りです。作業を代行する受託ではなく、やり方を教えて現場で使える状態まで伴走するコンサルです。コンサルが作業を巻き取ってしまうと、ただの契約社員になってしまいます。", "src": "第5回", "st": "確定"}, {"no": 4, "cat": "A 提供内容", "q": "AI社員を擬人化（名前・性格を与える）するのは、顧客に刺さるからですか？", "a": "刺さりやすさに加えて、役割を明確にして動かしやすくする狙いです。1フォルダ内にClaude Codeが動く領域を作り、秘書・経理・ライター等の人格と役割を振ります。役割分担だけの設計でも問題ありません。", "src": "第2回／第7回", "st": "確定"}, {"no": 5, "cat": "A 提供内容", "q": "受注後はAI社員を作って納品する受託開発のイメージ？単価設定がイメージできません。", "a": "受託開発（作って納品して終わり）ではありません。導入後も現場で使えるよう伴走し、次の課題も解決していくコンサルタントの顧問契約です。システム納品代ではなく、人件費削減などの『価値』に対して高単価・継続で契約いただけます。", "src": "よくある質問⑧", "st": "確定"}, {"no": 6, "cat": "I デモ・AI社員の作り方", "q": "AI社員は1つのフォルダに複数入れる？成果物（アウトプット）の構成はどう指定する？", "a": "1つのフォルダの中にClaude Codeが動く領域を作り、その中に役割（人格）を振っていきます。成果物（アウトプット）は、ウェブサイト・スライド・CSV・スプレッドシートなど用途ごとに指定します（例：シフトはスプレッドシートに出力）。※技術的な詳細は入会後のグループコンサルでマンツーマンで深掘りします。", "src": "第7回", "st": "確定"}, {"no": 7, "cat": "A 提供内容", "q": "デモを見せるのと、クライアント先で同様に支援することは多いですか？", "a": "デモで信頼を取ってから導入支援に入ります。会社ごとのルールに合わせて落とし込むのが腕の見せ所で、その伴走こそが価値になります。", "src": "第7回", "st": "確定"}, {"no": 8, "cat": "I デモ・AI社員の作り方", "q": "シフト表などは、最終的にどこまで自動化できますか？（作る／作り方を伝える／アプリ化）", "a": "段階によります。デモではスプレッドシートにシフト表を出力しますが、アプリ化すれば、社員・バイトが希望を入力すると自動でシフト表がアウトプットされる状態まで作れます。社長や責任者が何もしなくても回る形にできます。どこまでやるかは契約段階（初級〜上級）で調整します。", "src": "第7回", "st": "確定"}, {"no": 9, "cat": "B スキル・レベル", "q": "AIのスキルはどこまで身につく？自分でツールを作れないと売る商品がないのでは？", "a": "『作ってあげる作業』が主目的ではありません。発想・提案する側に立つ講座です。社長はAIレベル0なので、あなたがレベル3〜4あれば十分『教える側』になれます。", "src": "第1回", "st": "確定"}, {"no": 10, "cat": "B スキル・レベル", "q": "自分のAIスキルで足りるか不安です。", "a": "レベル3で十分です。社長はレベル0なので、3でも先生になれます。最先端を知りすぎている人より、相手の言葉に翻訳できる人が勝ちます。", "src": "第6回", "st": "確定"}, {"no": 11, "cat": "B スキル・レベル", "q": "AIの知識はどれくらい必要ですか？", "a": "プロレベルは不要です。要件を整理して技術は仲間に振る働き方も可能です。講座はAI未経験を前提に設計しています。", "src": "第6回／第7回", "st": "確定"}, {"no": 12, "cat": "B スキル・レベル", "q": "AI未経験でも大丈夫ですか？", "a": "大丈夫です。未経験前提の設計で、見せ方と順番のテンプレートをお渡しします。学ぶ気持ちと実行があれば成果につながります。", "src": "よくある質問①", "st": "確定"}, {"no": 13, "cat": "B スキル・レベル", "q": "全く経験のない業界でも、経営者の悩みを理解してAI提案できるか不安です。", "a": "片岡自身も知らない業界はあります。用意したヒアリングシートに沿って質問すれば、向こうから『実はこれが大変で…』と隠れた課題が出てきます。業界知識より聞き方の型です。", "src": "第7回", "st": "確定"}, {"no": 14, "cat": "C 営業・集客", "q": "リアルで既存顧客がいないのですが、対面で新規獲得するコツはありますか？", "a": "6つの販路（交流会・名刺術・Facebook・チラシ・ミニイベント・フォーム営業）があります。中でも交流会とフォーム営業が有効。コンサル型構造トークの順番（売り込まない→質問で整理→気づかせる→提案）を守れば、売り込まずに受注できます。", "src": "第2回", "st": "確定"}, {"no": 15, "cat": "C 営業・集客", "q": "興味を持ってもらいアポが取れるまで、何人くらいに出会う必要がありますか？（目安）", "a": "明確な人数より『接触回数』が鍵です。信頼＝人柄×接触回数。対面・Zoom・チラシ・名刺などで接触を重ねるほど信頼が積み上がり、アポにつながります。", "src": "第5回", "st": "確定"}, {"no": 16, "cat": "C 営業・集客", "q": "営業や交流会が苦手・口下手でも大丈夫ですか？交流会への参加は必須ですか？", "a": "気合いと根性の営業は不要です。自動フォーム営業ツール（KatsuoReach）やチラシで、顔を合わせなくても集客できます。交流会は必須ではありません。", "src": "よくある質問⑥／第7回", "st": "確定"}, {"no": 17, "cat": "C 営業・集客", "q": "営業トーク・刺さるピッチ・『契約したい』と言わせる方法を知りたい。", "a": "7ステップ（名刺→自己紹介トーク→交流会で興味→信頼構築→課題ヒアリング→AI社員提案→デモで契約）と、コンサル型構造トークを講座で型としてお渡しします。ロープレ練習会もあります。", "src": "第7回", "st": "確定"}, {"no": 18, "cat": "C 営業・集客", "q": "コンサルと製作（受託作業）の追加料金は分けるべき？流れで手伝わされないか不安。", "a": "最初にちゃんと切り分けを伝えるのが鉄則です。1日中作業を手伝うのはコンサルではなく契約社員になってしまう。範囲・費用を最初に明確にしましょう（講座で契約書の型も提供）。", "src": "第7回", "st": "確定"}, {"no": 19, "cat": "C 営業・集客", "q": "社長だけでなく現場担当者も紹介され、パッケージにしきれない悩みがあります。", "a": "決済権者でないと導入ハードルは上がります。大きい会社で部署長に決済権があれば別ですが、現場担当者ベースだと難しい場面も。相手の決済権を見極めるのがポイントです。", "src": "第7回", "st": "確定"}, {"no": 20, "cat": "D 価格・お金", "q": "コンサルの月額・サービス価格はどう決めればいい？", "a": "相場ではなく『自分がいくら必要か』から逆算します。月100万・年1000万を目標にするなら、そこから単価を設計し、それでも買ってくれる客を探す。相場に合わせると安くなりがちです。", "src": "第7回", "st": "確定"}, {"no": 21, "cat": "D 価格・お金", "q": "月50万のコンサルフィーが取れるイメージが付きません。", "a": "段階的です。最初は補助金やスポット支援で40万前後の単発→継続支援で月5万→信頼が乗れば月15〜30万。いきなり月50万を狙う話ではありません。", "src": "第5回", "st": "確定"}, {"no": 22, "cat": "D 価格・お金", "q": "『高い』と言われた時のROIの考え方・返し方は？", "a": "『補助金が1件通れば実質負担はこれくらい。さらに毎月これに使っている時間を時給換算すると3ヶ月で元が取れます』と返します。価格でなく回収で見てもらいます。", "src": "第5回", "st": "確定"}, {"no": 23, "cat": "D 価格・お金", "q": "クライアントに導入後、Claude APIなどのランニングコストが心配になりませんか？", "a": "ほぼネックになりません。事前に『AIで浮く人件費・時間』と『APIコスト』を天秤にかけて提案するため、コスト以上のリターンが明確に見え、社長も納得して導入します。", "src": "よくある質問⑧", "st": "確定"}, {"no": 24, "cat": "D 価格・お金", "q": "受講に必要なClaude Codeは無料で大丈夫ですか？", "a": "無料プランはありません。月20〜200ドルの有料プランが必要で、受講料とは別にご自身で契約いただきます。事業投資としてお考えください。", "src": "第7回", "st": "確定"}, {"no": 25, "cat": "D 価格・お金", "q": "クライアントへの提案は、一括払いとサブスク契約のどちらを勧めるのがおすすめ？", "a": "まず初期費用（イニシャル）をいくらか頂いて一定期間やってもらい、その後どうするか相談して継続（月額）に持っていくのが片岡の基本スタイルです。最初から純粋なサブスクだと単価が低くなりがち。おすすめは『初期費用＋継続』の組み合わせです。", "src": "第6回", "st": "確定"}, {"no": 26, "cat": "E 補助金", "q": "補助金が使える提案は、最初から言ったほうがいいですか？", "a": "言った方がいいです。『補助金を使ってお手伝いします』と最初から伝えると、お金のハードルがグッと下がります。社長さんはお得な話が好きなので、初めから出してOKです。", "src": "第7回", "st": "確定"}, {"no": 27, "cat": "E 補助金", "q": "補助金の知識がなくても提案できますか？", "a": "できます。園田芽衣氏（補助金支援総額5億円超）監修の補助金支援ツールで、業種・地域に合う補助金をAIがリサーチ、事業計画書づくりまでサポート。判断に迷う場面は補助金専門家チームにChatworkで相談できます。", "src": "よくある質問⑤／第5回", "st": "確定"}, {"no": 28, "cat": "E 補助金", "q": "クライアントへの補助金の申請フォローまで行いますか？採択まで半年ほどの空白期間は何を提案しますか？", "a": "（※片岡さん／専門家チームの回答を確定後に記載。空白期間の施策の考え方）", "src": "第5回", "st": "要確認"}, {"no": 29, "cat": "E 補助金", "q": "コンサル業自体で助成金を使うのは難しそう。リスキリング助成金などは別用途ですか？", "a": "監修の園田さん（補助金支援5億円超）は助成金も得意で『できる』とのこと。助成金は採択され条件に合えば返済不要です。具体的な使い方・適用は講座内の専門家セミナーで解説します（※詳細は園田さん監修の範囲）。", "src": "第7回", "st": "確定"}, {"no": 30, "cat": "E 補助金", "q": "デジタル化・AI導入補助金はIT導入支援事業者の登録が必要では？名前を借りる形ですか？", "a": "自分の会社をIT導入支援事業者として『事業登録』する形になります。登録してメニューを貼っておくと、そこから売れることもあります。登録のお手伝いも専門家がしてくれます（※実務の詳細は専門家セミナーで解説）。", "src": "第7回", "st": "確定"}, {"no": 31, "cat": "E 補助金", "q": "補助金申請は業者が絡まないとできないことが多いのでは？", "a": "業者が絡まないとできない場合もありますが、専門家いわく対応できる『裏技』があるとのこと（補助金ライブで解説予定）。※具体は園田さん監修の専門家チームが対応します。", "src": "第7回", "st": "確定"}, {"no": 32, "cat": "E 補助金", "q": "具体的にはどの補助金を使いますか？助成金との比較や手数料は？100万円獲得依頼でいくら？", "a": "講座のリサーチツールと専門家相談は期間中無料で使えます（自分で作って専門家に添削してもらう形なので手数料はかかりません）。一般に外部へ依頼すると成功報酬20〜30%が相場と言われます。どの補助金が使えるかは8000種類からツールで絞り込み、専門家に確認できます。", "src": "第5回", "st": "確定"}, {"no": 33, "cat": "E 補助金", "q": "AI導入補助金を受けるには、ITベンダー／サービス提供業者の登録が必要では？", "a": "（※専門家チームの実務回答を確定後に記載。持続化補助金など他の選択肢も含む）", "src": "第5回", "st": "要確認"}, {"no": 34, "cat": "F サポート", "q": "どんなコミュニティに入るのですか？", "a": "30〜40名規模で、地域がかぶらないように調整しています。情報を隠す必要がなく案件を見せ合える仲間。月2回のグループコンサルで片岡が直接対応するので『入って放置』にはなりません。", "src": "第5回", "st": "確定"}, {"no": 35, "cat": "F サポート", "q": "動画学習ではなく、グルコン・AIセミナーで学ぶ講座という理解で合っていますか？先行スタートでは何ができますか？", "a": "はい、グループコンサル・AIセミナー・トーク練習会が中心で、アーカイブも提供します。先行スタートでは決済者から順次Chatworkグループに招待し、テンプレートやコンテンツを先行公開します。", "src": "第2回", "st": "確定"}, {"no": 36, "cat": "F サポート", "q": "クライアント側でやってもらう作業は何がありますか？並走の労力イメージが持てません。", "a": "経営者は要件を言葉で伝えるだけ。音声入力が基本で、バリバリPCを使う必要はありません。現場の負担は最小限に設計します。", "src": "第5回", "st": "確定"}, {"no": 37, "cat": "F サポート", "q": "Chatworkで添削はしてもらえますか？", "a": "あります。商談前相談・提案書レビュー・SOS相談など、日常的に相談できる体制です。", "src": "第2回", "st": "確定"}, {"no": 38, "cat": "G 参加条件", "q": "講座の開始はいつからですか？", "a": "7月からです。先行決済いただいた方には、6月のうちからスタートダッシュ用のコンテンツ・テンプレートを順次提供します。", "src": "第2回", "st": "確定"}, {"no": 39, "cat": "G 参加条件", "q": "年齢制限はありますか？（30代中盤です）", "a": "年齢制限はありません。むしろ50代以上は対面で信用になりますが、年齢を問わず参加いただけます。", "src": "第2回", "st": "確定"}, {"no": 40, "cat": "G 参加条件", "q": "地方に住んでいますが問題ないですか？", "a": "むしろ地方のほうがチャンスです。ネットの全国大会ではなく、競合が少ない地方の対面市場で戦えます。", "src": "よくある質問②", "st": "確定"}, {"no": 41, "cat": "G 参加条件", "q": "本業が忙しいのですが両立できますか？", "a": "月1回のセミナーと月2回のグルコンなので両立できます。アーカイブ提供・チャット質問もあり、週末や夜の時間で参加可能です。", "src": "よくある質問③", "st": "確定"}, {"no": 42, "cat": "G 参加条件", "q": "すべて対面で、毎回クライアント先へ訪問して実務するのですか？", "a": "最初の出会い・信頼構築はリアルがおすすめですが、その後の商談（デモ）や実務サポートはZoom等で完結できるハイブリッド型です。全国どこでも自分のペースで働けます。", "src": "よくある質問⑦", "st": "確定"}, {"no": 43, "cat": "G 参加条件", "q": "会社員は平日日中に動きにくいです。土曜開催や副業は可能ですか？", "a": "事業者なら平日でOK。会社員の副業の場合、副業可の会社や土曜営業の会社が対象になりやすいです。副業禁止の会社は難しい面があります。", "src": "第7回", "st": "確定"}, {"no": 44, "cat": "G 参加条件", "q": "個人でも（法人でなくても）事業として登録・活動できますか？", "a": "片岡自身は実務に詳しくないものの、専門家いわく個人事業でも対応できる『裏技』があるとのこと。登録のサポートも専門家チームが行います（※詳細は専門家セミナーで確認できます）。", "src": "第7回", "st": "確定"}, {"no": 45, "cat": "G 参加条件", "q": "家族に相談してから決めたいのですが…", "a": "相談は大歓迎です。ご家族と話したうえで面談＆相談にお越しください。地域枠は30万人につき1名で考えており、埋まる前にご相談いただければと思います。", "src": "よくある質問④", "st": "確定"}, {"no": 46, "cat": "G 参加条件", "q": "各県3名までと書いてありますが、まだ気にしなくてよいですか？", "a": "早い方が枠を確保できます。同じ地域のライバルを増やさないためにも、気になる方は面談だけでも先に申し込んでおくのがおすすめです。", "src": "第7回", "st": "確定"}, {"no": 47, "cat": "H ツール", "q": "ChatGPTなど他のAIを使っていますが、Claudeである必要はありますか？", "a": "最終的に社長の悩みが解決できればツールは何でもいいのですが、プログラミング知識ゼロで実務に使える『AI社員』を構築するには、現状コーディング能力が圧倒的に高いClaude（Claude Code）が最適解。だからこそ明確な差別化になります。", "src": "よくある質問⑧", "st": "確定"}, {"no": 48, "cat": "C 営業・集客", "q": "『誰に頼めばいいか分からない・何を聞けばいいかも分からない』という社長を、どう相談につなげますか？", "a": "AIコンサルの役割は、実業の社長とAIの間に入って目線を合わせる『通訳』です。名刺→自己紹介トーク→交流会で興味→課題ヒアリング→デモ提示、の流れで自然に相談を起こします。", "src": "第7回", "st": "確定"}, {"no": 49, "cat": "D 価格・お金", "q": "クライアントに『無料プランでは足りない』ことを、どう説明すればいい？", "a": "Claude Codeに無料プランはなく、最低でも月20ドル等の有料プランが必要です。『これは事業投資です』とはっきり伝えます。AIで浮く人件費・時間とコストを天秤にかければ納得いただけます。", "src": "第7回", "st": "確定"}, {"no": 50, "cat": "C 営業・集客", "q": "AI社員を納品した後、その先の課題はどうやって炙り出しますか？", "a": "ヒアリングの型があります。用意したヒアリングシートで業務を棚卸しすると、向こうから次の課題が出てきます。そこへ継続提案をしていくことで、顧問契約が続いていきます。", "src": "第7回", "st": "確定"}, {"no": 51, "cat": "A 提供内容", "q": "ローカル＋AIで回すソフトを作るのか、エージェント指導なのか、提供範囲の住み分けは？", "a": "基本は『作業を受ける（受託）』のではなく、できるように伴走するコンサルです。開発・制作そのものを依頼された場合は、コンサルとは別料金として切り分けます。", "src": "第7回", "st": "確定"}, {"no": 52, "cat": "I デモ・AI社員の作り方", "q": "AI社員の役割分担は、具体的にどう設計しますか？", "a": "窓口役（秘書）が依頼を全部受けて、内容に応じて専門のAIに振る構成です。片岡のデモでは、秘書／ライター／マーケ・リサーチ／経理／デザイン・コーディング／シフト管理…と役割ごとにエージェントを分けています。", "src": "第7回", "st": "確定"}, {"no": 53, "cat": "I デモ・AI社員の作り方", "q": "AI社員に『人格・役割』を与えるのはなぜ？", "a": "1人1人に『あなたの仕事はこれ』と人格・役割を決めてあげないと、うまく動いてくれません。『勝手に走るな』といった制御も指定します。この“仕込み”が動作の精度を左右する重要なポイントです。クライアントごとに会社のルールが違うので、導入時にそこを整えるのが腕の見せどころです。", "src": "第7回", "st": "確定"}, {"no": 54, "cat": "I デモ・AI社員の作り方", "q": "デモはどのツールで、どう作っていますか？（Claude Codeの使い方）", "a": "Claude Codeを使っています。使い方は大きく4つ（①命令文で直接 ②デスクトップアプリ ③Web ④表面にUIを付ける）。深く知らなくても、まずは自分で1つ作れる状態を目指せばOKです。最先端の知識は不要です。", "src": "第7回", "st": "確定"}, {"no": 55, "cat": "I デモ・AI社員の作り方", "q": "デモの精度は？読み取れない箇所が出た時はどうなりますか？", "a": "写真のレシート等で読み取れない部分は、AI側が『ここは不明です』とチェックして教えてくれます。片岡も最初は二重計上などの失敗をしましたが、指示を調整すれば直せます。完璧を狙うより、まず“見せられる形”にするのが先です。", "src": "第7回", "st": "確定"}];
const CATS = ["A 提供内容", "I デモ・AI社員の作り方", "B スキル・レベル", "C 営業・集客", "D 価格・お金", "E 補助金", "F サポート", "G 参加条件", "H ツール"];
const listEl=document.getElementById('list');
const catSel=document.getElementById('catSel');
const qInput=document.getElementById('q');
const countEl=document.getElementById('count');
const pendChk=document.getElementById('pendChk');
const emptyEl=document.getElementById('empty');
const toggleAllBtn=document.getElementById('toggleAll');
let allOpen=false;
CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);});
function render(){
  const cat=catSel.value, kw=qInput.value.trim(), showPend=pendChk.checked;
  listEl.innerHTML='';
  let n=0;
  DATA.forEach(d=>{
    if(d.st==='要確認' && !showPend) return;
    if(cat && d.cat!==cat) return;
    if(kw && !(d.q.includes(kw)||d.a.includes(kw))) return;
    n++;
    const item=document.createElement('div');item.className='item'+(allOpen?' open':'');
    const pend=d.st==='要確認'?'<span class="pending">回答準備中</span>':'';
    const ans=d.st==='要確認'?'（事務局で正式回答を準備中です）':d.a;
    item.innerHTML=`<div class="q"><span class="tag">${d.cat.split(' ')[0]}</span><span class="qt">${d.q}${pend}</span><span class="arw">▶</span></div>`+
      `<div class="a">${ans}<br><span class="src">出典：${d.src}</span></div>`;
    item.querySelector('.q').addEventListener('click',()=>item.classList.toggle('open'));
    listEl.appendChild(item);
  });
  countEl.textContent=n+'件';
  emptyEl.style.display=n===0?'block':'none';
}
catSel.onchange=render;qInput.oninput=render;pendChk.onchange=render;
toggleAllBtn.onclick=()=>{allOpen=!allOpen;toggleAllBtn.textContent=allOpen?'すべて閉じる':'すべて開く';render();};
render();
</script>
</body>
</html>
