<style>
:root{--ink:#1a2842;--accent:#ec8400;--bg:#f4f6fa;--rule:#dfe3ea;--muted:#5b6270;--softbg:#fef4e6;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif;color:var(--ink);background:var(--bg);line-height:1.95;font-feature-settings:"palt";-webkit-text-size-adjust:100%;}
body{font-size:18px;}
.head{background:var(--ink);color:#fff;padding:40px 20px 34px;text-align:center;}
.head h1{margin:0 0 10px;font-size:27px;font-weight:800;line-height:1.5;}
.head p{margin:0;font-size:15px;color:#cdd6e6;}
.wrap{max-width:900px;margin:0 auto;padding:0 16px 90px;}
.note{background:var(--softbg);border-left:5px solid var(--accent);padding:16px 20px;border-radius:6px;font-size:16px;margin:20px 0;line-height:1.85;}
.controls{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 0 14px;margin-bottom:8px;border-bottom:1px solid var(--rule);}
.controls-inner{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
select,input[type=search]{font-family:inherit;font-size:18px;padding:13px 16px;border:2px solid var(--rule);border-radius:10px;background:#fff;color:var(--ink);outline:none;}
select{min-width:210px;cursor:pointer;}
select:focus,input:focus{border-color:var(--accent);}
input[type=search]{flex:1;min-width:180px;}
.count{font-size:15px;color:var(--muted);margin-left:auto;white-space:nowrap;font-weight:700;}
.toggle{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--muted);cursor:pointer;user-select:none;}
.toggle input{width:18px;height:18px;}
.expand-all{font-size:15px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0;font-family:inherit;text-decoration:underline;font-weight:700;}
.item{background:#fff;border:1px solid var(--rule);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:box-shadow .15s;}
.item:hover{box-shadow:0 4px 18px rgba(20,30,60,.07);}
.q{display:flex;align-items:flex-start;gap:12px;padding:20px 22px;cursor:pointer;font-weight:700;font-size:19px;line-height:1.7;}
.q .tag{flex-shrink:0;font-size:13px;font-weight:700;color:var(--accent);background:var(--softbg);padding:4px 10px;border-radius:12px;white-space:nowrap;margin-top:4px;}
.q .qt{flex:1;}
.q .arw{flex-shrink:0;color:var(--muted);transition:transform .2s;margin-top:4px;font-size:15px;}
.item.open .q .arw{transform:rotate(90deg);}
.a{display:none;padding:0 22px 22px 22px;font-size:17.5px;color:#2a3450;border-top:1px dashed var(--rule);line-height:1.95;}
.item.open .a{display:block;padding-top:18px;}
.a a{color:var(--accent);font-weight:700;text-decoration:underline;text-underline-offset:3px;word-break:break-all;}
.a strong{background:linear-gradient(transparent 62%, rgba(236,132,0,0.22) 62%);}
.a .src{display:inline-block;margin-top:14px;font-size:13px;color:var(--muted);background:var(--bg);padding:4px 10px;border-radius:4px;}
.pending{font-size:13px;font-weight:700;color:#b85042;background:#fbeae7;padding:3px 9px;border-radius:10px;margin-left:8px;}
.empty{text-align:center;color:var(--muted);padding:56px 0;font-size:17px;}
@media(max-width:600px){
 body{font-size:17px;}
 .head h1{font-size:21px;}
 .q{font-size:17px;padding:16px 16px;}
 .a{font-size:16.5px;padding:0 16px 18px;}
 .count{margin-left:0;width:100%;}
 select,input[type=search]{font-size:17px;}
}
@media print{.controls{position:static;}.a{display:block!important;}.arw{display:none;}}
</style>

<script>
const DATA=[{"no": 1, "cat": "A 提供内容", "q": "初級・中級・上級で、それぞれどんなコンサル内容ですか？自分の現在地が知りたい。", "a": "3層で提供します。【初級】AIの使い方を教える（単発〜1ヶ月・月5〜10万）／【中級】業務改善の仕組み化（1〜3ヶ月・初期30万前後）／【上級】AI社員・導入支援まで伴走（3〜6ヶ月・100万〜）。最初から大きく狙わず、信頼を積んで上位支援へ進みます。", "src": "第1回", "st": "確定"}, {"no": 2, "cat": "A 提供内容", "q": "Claudeの使い方を社内に教える型と、AI社員として仕組み化して渡す型（クライアントは触らない）、どちらのイメージ？", "a": "結論から言うと、基本は『仕組み化して渡す＋伴走』ですが、“全部やってあげる”のは違います。<br><br>▸ 質問の背景（実際に出た相談）<br>関西で中小企業向けにやりたい方から『①Claude Codeの使い方を教えるコンサル型 ②業務をヒアリングしてAI社員として仕組み化し全部渡す型、どちらがいいか迷っている。アナログな社長が多いから、教えても使ってくれないのでは』という相談がありました。<br><br>▸ 片岡の答え<br>気持ちは分かりますが、②の“全部受け負う”は受け仕事なのでやってはいけません。コンサルは下請けではないので、8〜9割は相手が回せるようにして、足りない部分を聞いてもらう流れにしないと件数がこなせません。全部受けたら、いくら時間があっても足りない。<br><br>▸ アナログな社長でも大丈夫？<br>大丈夫です。経営者は要件を言葉で伝えるだけ。音声入力が基本で、バリバリPCを使う必要はありません。三重の塾の例では、業者に数百万と言われた学習アプリを、口頭の依頼で一緒に2時間で完成させました。", "src": "2回・5回・7回", "st": "確定"}, {"no": 3, "cat": "A 提供内容", "q": "成果物をこちらが受ける（代行する）のではなく、クライアントにやり方を教えるサポート、という理解で合っていますか？", "a": "その通りで、作業を代行する『受け仕事』はやってはいけません。受け仕事は最悪で、よく『コンサルやってます』と言いながら1日中いて作業を手伝っている人がいますが、それはコンサルではなく“ただの契約社員”です。<br><br>▸ でも、アナログな社長だと自分で使えないのでは？（やってあげた方がいいのでは）<br>だからこそ『やってあげちゃダメ』なんです。ある程度できるようにしてあげて、分からないところだけ聞いてくる、というペースが理想。毎日ガンガン聞いてくるレベルだと回らないので、『詰まったら聞きたい』状態にして、月1万円くらいのフィーでも継続的にいただける形にします。8〜9割は相手が自分で回せて、足りない部分を聞いてもらう——この流れにしないと件数がこなせません。全部受け負ったら、いくら時間があっても足りません。", "src": "第5回", "st": "確定"}, {"no": 4, "cat": "A 提供内容", "q": "AI社員を擬人化（名前・性格を与える）するのは、顧客に刺さるからですか？", "a": "刺さりやすさに加えて、AIを動かしやすくするためです。<br><br>▸ どう設計している？<br>1つのフォルダにClaude Codeが動く領域を作り、秘書・経理・ライター等の人格と役割を振ります。1人1人に『あなたの仕事はこれ』『勝手に走るな』と決めないと、作っても動いてくれません。この“仕込み”が精度を左右します。<br><br>▸ 役割分担だけではダメ？<br>役割を分けて窓口役に指示するだけの設計でも問題ありません。擬人化はデモで『自己紹介して』と言うと各AIが自己紹介して受ける、という見せ場にもなります。", "src": "第2回・第7回", "st": "確定"}, {"no": 5, "cat": "A 提供内容", "q": "受注後はAI社員を作って納品する受託開発のイメージ？単価設定がイメージできません。", "a": "受託開発（作って納品して終わり）ではありません。<br><br>▸ では何？<br>導入後も現場で使えるように伴走し、次の課題も解決していく『コンサルタントとしての顧問契約』です。<br><br>▸ 単価設定の考え方は？<br>システム納品代ではなく、人件費削減などの“価値”に対して課金します。だから値下げ交渉も起きにくく、高単価・継続でいただけます。AIを入り口に信頼を作り、本業（あなたの専門領域）の付加価値まで上げていくのが狙いです。", "src": "よくある質問⑧", "st": "確定"}, {"no": 6, "cat": "A 提供内容", "q": "デモを見せるのと、クライアント先で同様に支援することは多いですか？", "a": "デモで信頼を取ってから、導入支援に入ります。<br><br>▸ デモは本物？<br>デモは一旦パフォーマンスとして見せている面もありますが、実際にクライアント先で『同じようにやってほしい』と要望されればやります。経費処理などはまさにそれ。<br><br>▸ 価値はどこ？<br>会社ごとにルールが違うので、それに合わせて落とし込む“伴走”こそが価値。そこをお手伝いするのがコンサルの腕の見せどころです。", "src": "第7回", "st": "確定"}, {"no": 41, "cat": "A 提供内容", "q": "ローカル＋AIで回すソフトを作るのか、エージェント指導なのか、提供範囲の住み分けは？", "a": "基本は『作業を受ける（受託）』のではなく、できるように伴走するコンサルの立場です。<br><br>▸ ソフトを作ってと言われたら？<br>『作って』と言われたら、それは制作費・開発費がかかります（コンサルではなく開発になる）。<br><br>▸ 一緒にやるのは？<br>『社長が自分の手でやりたいから一緒に作って』なら、一緒にやります。住み分けが必要で、そこを最初に切り分けて伝えます。", "src": "第7回", "st": "確定"}, {"no": 54, "cat": "I デモ・AI社員の作り方", "q": "デモではどんなことを見せるのですか？（経費精算デモの流れ）", "a": "片岡が社長に見せて評判が良かったのは『経費精算デモ』と『シフト組みデモ』です。<br><br>▸ 経費デモの流れは？<br>バラバラのレシートを写真に撮って指定フォルダに入れる→AIが読み取り→仕訳→CSV（Excelのような表）に落とす、という流れです。簡単なレシートも、スキャンした複数枚も、A4サイズも、手書きが混ざったものもOK。<br><br>▸ 海外のレシートは？<br>出張で使った海外のレシート（タイバーツ等）も、現地通貨を日本円に換算して計上してくれます。<br><br>▸ 読み取れない時は？<br>『領収書が1000円、お釣り1000円と見えるので、経費は9000円の可能性があります』のように、不明な箇所をAIがチェックして教えてくれます。", "src": "第7回", "st": "確定"}, {"no": 55, "cat": "I デモ・AI社員の作り方", "q": "シフト表などは、最終的にどこまで自動化できますか？", "a": "デモでは、社員・バイトからのバラバラな希望（『この日入れます』が好き勝手な書式で来る状態）をシフト専門のAIに投げて、シフト表をスプレッドシートに出力します。<br><br>▸ もっと自動化できる？<br>アプリ化すれば、社員・バイトが希望を入力すると自動でシフト表がアウトプットされる状態まで作れます。社長や責任者が何もしなくても勝手にシフトが組み上がり、『この日は人が足りません』まで出せるようにできます。<br><br>▸ どこまでやるかは？<br>契約段階（初級〜上級）で調整します。デモはパフォーマンスとして見せていますが、実際のクライアント先でも同じように要望されればやります。", "src": "第7回", "st": "確定"}, {"no": 56, "cat": "I デモ・AI社員の作り方", "q": "AI社員の役割分担は、具体的にどう設計しますか？", "a": "窓口役（秘書）が依頼を全部受けて、内容に応じて専門のAIに振る構成です。<br><br>▸ 片岡のデモの構成は？<br>秘書役が片岡のオーダーを全部受け、仕事の内容ごとに専門AIへ振ります。ライター、マーケ・リサーチ・構成（プランニング）、経理、デザイン・コーディング、シフト管理…と役割ごとにエージェントを分けています。<br><br>▸ デモで受けるポイントは？<br>各AIに『自己紹介して』と言うと、それぞれが自己紹介します。これがめちゃくちゃ受けます。", "src": "第7回", "st": "確定"}, {"no": 57, "cat": "I デモ・AI社員の作り方", "q": "AI社員に『人格・役割』を与えるのはなぜ？", "a": "1人1人に『あなたの仕事はこれ』と人格・役割を決めてあげないと、うまく動いてくれないからです。<br><br>▸ どう仕込む？<br>1つのフォルダの中にClaude Codeが動く領域を作り、役割を振り、『勝手に走るな』といった制御も指定します。この“仕込み”が動作の精度を左右する重要なポイントです。<br><br>▸ クライアントごとに違う？<br>会社ごとにルールが違うので、それをいかに知って、導入の時に一緒に整えてあげるか——そこがコンサルの腕の見せどころになります。", "src": "第7回", "st": "確定"}, {"no": 58, "cat": "I デモ・AI社員の作り方", "q": "デモはどのツールで、どう作っていますか？（Claude Codeの使い方）", "a": "Claude Codeを使っています。使い方は大きく4つ（①命令文で直接 ②デスクトップアプリ ③Web ④表面にUIを付ける形）。詳しく知らなくても、まずは自分で1つ作れる状態を目指せばOKです。<br><br>▸ 成果物（アウトプット）の作り分けは？<br>用途で使い分けます。スライドは、画像はうまいが編集できないAIもあるので、編集したいものはGeminiで作ったり。画像生成が得意なサービスはClaude Codeと繋いで使い分けます。『どのAIが何が得意か』で振り分けるのがコツです。<br><br>▸ 最先端の知識は必要？<br>いりません。片岡自身も最先端は追っていません。", "src": "第7回", "st": "確定"}, {"no": 59, "cat": "I デモ・AI社員の作り方", "q": "デモの精度は？読み取れない箇所が出た時はどうなりますか？", "a": "写真のレシート等で読み取れない部分は、AI側が『ここは不明です』とチェックして教えてくれます。<br><br>▸ 失敗することは？<br>片岡も最初は失敗しました。二重計上してしまい『やけにお金を使っているな』と思ったら二重計上だった、ということも。気づいて直しました。<br><br>▸ どう考えればいい？<br>完璧を狙うより、まず“見せられる形”にするのが先。不明箇所は一緒に確認しながら詰めていけば十分です。", "src": "第7回", "st": "確定"}, {"no": 60, "cat": "I デモ・AI社員の作り方", "q": "デモが作れない・想像できない場合はどうすれば？", "a": "大丈夫です。講座の中で一緒に作ります。<br><br>▸ 具体的には？<br>『みんなでデモを作っていきましょう』という回があり、リサーチして『この業種の社長はどんなことで悩んでいるか』を一緒に考えたり、片岡が使っているデモをそのまま使ってもOK。<br><br>▸ 流れはシンプル<br>デモ作りは『業種を選ぶ→形にする→再現する』だけ。実演できる状態を目指します。できる方はどんどん自分で作っていけばOKです。", "src": "第7回", "st": "確定"}, {"no": 62, "cat": "I デモ・AI社員の作り方", "q": "Claude Codeで生成したものは、クライアントに共有・お渡しできますか？", "a": "あ、できます。できます。できます。共有できます。<br><br>▸ 技術的な詳細<br>あの、ちょっと難しくなっちゃうんですよね、技術的な話。ちょっと難しくなっちゃうので。<strong>それはできます</strong>。<br><br>▸ 片岡の場合<br>だから僕の場合は<strong>こちら側で仕込んだものを相手に渡して、『これちょっと入れてみて』みたいな感じでやります</strong>。", "src": "第8回", "st": "確定"}, {"no": 80, "cat": "I デモ・AI社員の作り方", "q": "業種別のデモアイデア（建築・医療・飲食など）はどう発想すればいいですか？", "a": "<strong>皆さん業界にいた方が違うから、刺さるポイントとかが違う</strong>。でもその刺さるポイント分かってたら、それだけでめちゃくちゃアドバンテージじゃないですか。<br><br>▸ 実際に出てきたアイデア<br>9回目の参加者からは「<strong>建築業の見積もりが全部できたら大ウケする</strong>」「<strong>医療現場のシフト</strong>」「<strong>看護記録や診療記録がボイスで入力できたら嬉しい</strong>」「<strong>飲食店・ホテルのシフト・経理周り</strong>」「<strong>食材の仕入れ管理や在庫管理</strong>」「<strong>情報過多になっている社長の情報整理</strong>」「<strong>自動のリサーチまわり</strong>」「<strong>クラウドシステムのアカウント管理</strong>」など、業界経験者ならではの着眼点が連続。<br><br>▸ 業界出身は大きなアドバンテージ<br><strong>その業界にいた方は業界のことが分かってるので、より提案しやすいですよね。すごいアドバンテージです</strong>。今から「これからAIのコンサルになりたい」って人と、すでに業界にいてそういうこと分かってる方とは全然違う。<br><br>▸ デモ作りは難しくない<br><strong>デモ作りはね、そんな難しくないと思うので、そこは全然大丈夫です</strong>。極端な話、チャッピーの使い方を教えるだけでも「教えてくれ」って言われる世界です。", "src": "第9回", "st": "確定"}, {"no": 7, "cat": "B スキル・レベル", "q": "AIのスキルはどこまで身につく？自分でツールを作れないと売る商品がないのでは？", "a": "『作ってあげる作業』が主目的の講座ではありません。発想・提案する側に立つための講座です。<br><br>▸ 自分でツールを作れないと売る商品がない？<br>いいえ。社長はAIレベル0なので、あなたがレベル3〜4あれば十分『教える側』になれます。最先端を知りすぎている人より、相手の言葉に翻訳できる人が勝ちます。<br><br>▸ 技術が足りない部分は？<br>『全員で勝つ』設計なので、技術が得意な仲間に振りながら進められます。要件を整理して、難しい技術はアサインする働き方も可能です。", "src": "第1回", "st": "確定"}, {"no": 8, "cat": "B スキル・レベル", "q": "自分のAIスキルで足りるか不安です。", "a": "レベル3で十分です。社長さんはAIレベル0なので、3でも先生になれます。<br><br>▸ 最先端を知らないと不利？<br>むしろ逆です。最先端を知りすぎている人より、相手の言葉に翻訳できる“通訳”ができる人が勝ちます。片岡自身も最先端は追っていません。<br><br>▸ それでも不安なら？<br>『全員で勝つ』のが講座のコンセプトです。自分一人で全部できなくても、技術が得意な仲間に振りながら、みんなで助け合って成長していける設計。要件を整理して、難しい技術は仲間にアサインする働き方も可能です。", "src": "6回・7回", "st": "確定"}, {"no": 9, "cat": "B スキル・レベル", "q": "AIの知識はどれくらい必要ですか？", "a": "プロレベルは不要です。社長はレベル0なので、あなたがレベル3〜4あれば十分『教える側』に立てます。<br><br>▸ 技術が難しい部分は？<br>要件を整理して、技術的に難しい部分は仲間（技術が得意な受講生）に振る働き方もできます。だから『技術を極めてから』ではなく、今のレベルで始められます。", "src": "6回・7回", "st": "確定"}, {"no": 10, "cat": "B スキル・レベル", "q": "AI未経験でも大丈夫ですか？", "a": "大丈夫です。レベルは関係ありません。自信がなくてもレベル3で全然いけます。<br><br>▸ なぜ？<br>講座はそういう（未経験・自信がない）方に向けて作っているからです。見せ方と順番のテンプレートをお渡しするので迷いません。社長さんもどうせレベル0なので、完璧な知識より『一緒に困りごとを解決していく姿勢』のほうが大事。学ぶ気持ちと実行があれば、十分に成果につながります。", "src": "よくある質問①／第7回", "st": "確定"}, {"no": 11, "cat": "B スキル・レベル", "q": "全く経験のない業界でも、経営者の悩みを理解してAI提案できるか不安です。", "a": "片岡自身も、全く分からない業界はあります。胡椒のプロデュースをしたこともありますが、胡椒のことは知りませんでしたし、ケーキ屋さんをやったこともあります。<br><br>▸ 知らないのに提案できるの？<br>できます。1人で考えると詰まることも、周りの経験者に1人聞けば解決します。たとえば田中さんは1人で10億円規模の会社をいろんな業界でやっているので経験が豊富。全くできないのに『できます』はダメ（ラーメン屋で宝石を売ります、はダメ）ですが、“ちょっと経験のない業界”くらいなら、意外とできてしまうものです。不安にならず、行っちゃった方がいいです。", "src": "第7回", "st": "確定"}, {"no": 12, "cat": "C 営業・集客", "q": "リアルで既存顧客がいないのですが、対面で新規獲得するコツはありますか？", "a": "6つの販路があります（交流会・名刺術・Facebook・チラシ・ミニイベント・フォーム営業）。講座では全部お伝えしますが、特に有効なのは交流会とフォーム営業です。<br><br>▸ 一番効くのは？<br>交流会です。経営者・決済権者が集まる場に出向くのが、確率論で一番高い。出会って、興味を持ってくれた人に次回アポを取る。ここで“興味のない人”に売り込んではいけません（ただの無理売りになる）。AIは興味を持つ人の割合が多いので、相性がいいんです。<br><br>▸ 売り込まずに受注できる？<br>できます。コンサル型の構造トーク（売り込まない→質問で整理→相手に気づかせる→必要なら提案）の順番を守れば、売り込み色なく受注できます。初めは慣れなくても、順番が決まっているので慣れれば誰でもできます。", "src": "2回・7回", "st": "確定"}, {"no": 13, "cat": "C 営業・集客", "q": "興味を持ってもらいアポが取れるまで、何人くらいに出会う必要がありますか？（目安）", "a": "明確な人数より『接触回数』が鍵です。<br><br>▸ どういうこと？<br>『信頼＝人柄 × 接触回数』。対面・Zoom・チラシ・名刺などで接触を重ねるほど信頼が積み上がり、アポにつながります。一度で決めようとせず、交流会で何度も会えるので、その積み重ねで取れていきます。", "src": "第5回", "st": "確定"}, {"no": 14, "cat": "C 営業・集客", "q": "営業や交流会が苦手・口下手でも大丈夫ですか？交流会への参加は必須ですか？", "a": "大丈夫です。気合いと根性の営業はいりません。交流会への参加も必須ではありません。<br><br>▸ 交流会に出なくてもいい？<br>はい。自動のフォーム営業ツール（KatsuoReach）や、チラシ戦略（自分で配らなくていいポスティング含む）で集客できます。片岡のクライアントでチラシでうまくやっている人もいます。<br><br>▸ 商談でうまく話せるか不安<br>コンサル型構造トークという“型”があるので、それに沿ってヒアリングするだけ。型を練習する場（ロープレ練習会）も用意します。", "src": "よくある質問⑥／第7回", "st": "確定"}, {"no": 15, "cat": "C 営業・集客", "q": "営業トーク・刺さるピッチ・『契約したい』と言わせる方法を知りたい。", "a": "正直、『営業トーク』という言葉には違和感があります。片岡は“営業”を意識したことがなく、『お勧めしているだけ』。お宅のお悩みには、これがいいんじゃないですか、と教えてあげる感覚です。友達に『これいいよ』と勧めるのと同じです。<br><br>▸ 知らない相手でもいけますか？<br>知っている社長さんだからできる感覚で、全く知らない方にいきなりは無理。だから交流会などで一度関係を作ってから、になります。<br><br>▸ 興味がなさそうな人には？<br>押しません。興味がある人は必ずいるので、その人とだけ進めます。お金の問題で今回は…という人にも押さない。交流会でまた会えるので、その日きりではありません。時間が経ってまた話して、後から受注、ということもよくあります。", "src": "第7回", "st": "確定"}, {"no": 16, "cat": "C 営業・集客", "q": "コンサルと製作（受託作業）の追加料金は分けるべき？流れで手伝わされないか不安。", "a": "分けるべきです。受け仕事（作業の代行）は最悪で、1日中いて手伝うのはコンサルではなく契約社員になってしまいます。<br><br>▸ 流れで手伝わされないためには？<br>最初にちゃんと切り分けを伝えることです。『作ってよ』と言われたら制作費・開発費がかかる。『社長が自分の手でやりたいから一緒に作って』なら一緒にやる。コンサルは“やり方を教えて伴走する”のが仕事で、開発を巻き取ると完全に別物（開発案件）になります。住み分けを最初に言わないと、ずるずる手伝う羽目になります。", "src": "第7回", "st": "確定"}, {"no": 17, "cat": "C 営業・集客", "q": "社長だけでなく現場担当者も紹介され、パッケージにしきれない悩みがあります。", "a": "現場の方は良い方でも“決済権”がないことが多いです。現場で買ってくれるなら別ですが、結局は社長に決済を取りにいくことになり、社長まで上がらないとほぼ決まりません。<br><br>▸ 大きい会社なら違う？<br>ある程度の規模で、その部署長が決済権を持っているなら話は別です。ただ、超大規模な会社で現場の社員さんに持っていくのは、決済の壁があってハードルが高い。相手の決済権を見極めるのがポイントです。", "src": "第7回", "st": "確定"}, {"no": 38, "cat": "C 営業・集客", "q": "『誰に頼めばいいか分からない・何を聞けばいいかも分からない』という社長を、どう相談につなげますか？", "a": "AIコンサルの役割は、実業の社長とAIの間に入って目線を合わせる『通訳』です。社長は『AIはすごいらしい』『業務が楽になるらしい』と噂は聞いているけれど、具体的にどうすればいいか・誰に聞けばいいか分からない。ここに大きなギャップ（空白）があります。<br><br>▸ どう相談につなげる？<br>名刺→自己紹介トーク→交流会で興味を引く→信頼を積む→課題ヒアリング→『AI社員を作りませんか』と提案→デモを見せて契約、の7ステップ。順番を守れば自然に相談が起きます。この空白に切り込めたから、片岡は初月250万円を受注できました。", "src": "第7回", "st": "確定"}, {"no": 40, "cat": "C 営業・集客", "q": "AI社員を納品した後、その先の課題はどうやって炙り出しますか？", "a": "ヒアリングの型で炙り出します。用意したヒアリングシートで業務を棚卸しすると、社長自身も言語化できていなかった課題が『実はこれが大変で…』と向こうから出てきます。<br><br>▸ なぜ続く？<br>そこに継続提案をしていくことで顧問契約が続きます。3ヶ月で終わりではなく、その後も並走する——『契約後の支援まで見せる』と、口に出せないけれど『3ヶ月で終わりなのか』と不安な人も安心してくれます。", "src": "第7回", "st": "確定"}, {"no": 66, "cat": "C 営業・集客", "q": "エレベータートーク（短い時間で自分を売り込むトーク）はどうやって組み立てますか？", "a": "<strong>これはもう決まりがあるので、それに沿ってやっていただければいいかなっていう感じです</strong>。エレベータートークとかレーザートークとかありますよね。<br><br>▸ 片岡＋田中の経験から<br>僕もそれでやってきたし、一緒にやってる田中さんっていうのもセールスができる――セールスができるかの話じゃない、この話、<strong>1人で10億円やってる会社の社長</strong>なんで。そういったところからめちゃくちゃトーク（の型）はあります。", "src": "第8回", "st": "確定"}, {"no": 67, "cat": "C 営業・集客", "q": "名刺・チラシのテンプレートはありますか？", "a": "もちろんあります。<strong>テンプレートもあるし、過去に売れたとかじゃなくて今現在反応が取れてるチラシをあげますんで</strong>。<br><br>▸ どれくらい売れているチラシか<br><strong>年間1000万以上利益出してるやつとか、1枚のチラシで800万売ってるチラシ</strong>とかもあるんで、それを、はい。<strong>僕のチラシがあるんで、それはテンプレートとしてお渡しします</strong>。<br><br>▸ 片岡の実績<br>言っても僕がチラシだけで1億何千も持ってきてるっていうのもあるので、いわゆるそういうチラシをもちろんテンプレとして差し上げます。<strong>はい、大丈夫です</strong>。", "src": "第8回", "st": "確定"}, {"no": 70, "cat": "C 営業・集客", "q": "商工会議所はイメージ湧きますが、地方には他にどんな交流会がありますか？", "a": "<strong>地方にもちっちゃい交流会がいっぱいあります</strong>。ネットで「経営者交流会」「経営交流会」とかで調べると出てきますよ。<br><br>▸ 具体例<br><strong>ライオンズも全然ありだと思います。割と権威の高い社長さんというか、売上やってる社長さんがいたりする</strong>。あと商工会議所、青年会議所、異業種交流会も。<br><br>▸ 選び方のポイント<br><strong>とにかくポイントは、決済できる人がいるところ。社長です</strong>。社員とか部長は決断できないからね。課長・係長レベルは無理ですね。<br><br>▸ 苦手な方への補足<br>人が多いと気持ち悪くなっちゃう人もいるじゃないですか。それはやっぱり、いきなりでかいとこ行くとプレッシャーになるので、まずちっちゃい交流会から段階的に。", "src": "第9回", "st": "確定"}, {"no": 71, "cat": "C 営業・集客", "q": "チラシは交流会で配るんですか？自分でポスティングするんですか？", "a": "<strong>人集まるとこで配るのは結構いいと思います</strong>。社長さんがいるとこで配るとかね。<br><br>▸ ポスティングについて<br><strong>ポスティングするのも業種によってはありだと思います</strong>。はい、業種次第ですね。<br><br>▸ チラシの位置づけ<br><strong>リアルな場ではチラシはLPです。完全にLPの代わり</strong>。ターゲット絞るためのマーケティングツールなので、自分の意図した人が「これ何？」って聞きに来る。聞きに来たらもうこっちのもんですよね。<br><br>▸ 興味ない人は気にしなくていい<br>知らない・興味のない人はどうでもいいんです。<strong>興味のある人を集めるためにチラシを使う</strong>ってことですね。", "src": "第9回", "st": "確定"}, {"no": 79, "cat": "C 営業・集客", "q": "実際の対面営業は、検索して地方の交流会に参加するということでよろしいでしょうか？そのサポートや紹介もしていただけるのでしょうか？", "a": "<strong>もちろんサポートします、します。はい</strong>。<br><br>▸ 紹介について<br><strong>紹介はちょっと色々絡みがあって、その交流会と絡みがなかったら紹介できないので、「こういうとこがいいよ」っていうのはもちろんアドバイスはします</strong>。<br><br>▸ 活動エリアを決めてもらう<br><strong>あとどこで、自分がどこのエリアで活動したいかってこともあるんですよね。活動エリアは決めて欲しいんですよね</strong>。<br><br>▸ 立ち振る舞いも教える<br><strong>交流会でのどういう立ち振る舞いとかね、あの僕も10何年それでやってるので、そこだけで多く近くやってるのでね。だからそういったことも全然アドバイスはできるのではい。安心してください</strong>。", "src": "第9回", "st": "確定"}, {"no": 18, "cat": "D 価格・お金", "q": "コンサルの月額・サービス価格はどう決めればいい？", "a": "まず『自分が時給いくら欲しいか』を決めてください。5万円でも3万円でも構いません。片岡自身は1時間あたり3万〜5万のイメージです。パッケージなら『その時給 × かかる時間』で見積もります。<br><br>▸ では月額はどう設定する？<br>初期費用（イニシャルチャージ）をまず頂き、その後に月額で継続してもらう形が基本です。実際に初期費用を頂いて、月10万円もらっている例もあります。<br><br>▸ 関わり方で変わりますか？<br>月1回1時間ならいいのですが、訪問コンサルだと移動時間もかかるので、その分が単価に乗ってきます。実務レベルでどう関わるかで変わるのでケースバイケース。『こういう受注が取れたけど、どうしたらいい？』と相談いただければ、片岡も田中さんもコンサル経験が豊富なので、いろんなケースをもとに一緒に設計できます。<br><br>▸ 相場は気にしなくていい？<br>『この地域はいくら』『この業界はいくら』と相場を読むのではなく、自分が必要な額から決めて、それでも買ってくれる人を探す、という考え方です。なお、安くするのは簡単でも後から上げるのは大変なので、最初の価格設定が一番重要です。", "src": "第7回", "st": "確定"}, {"no": 19, "cat": "D 価格・お金", "q": "月50万のコンサルフィーが取れるイメージが付きません。", "a": "段階的に育てます。いきなり月50万を狙う話ではありません。<br><br>▸ 順番は？<br>最初は補助金やスポット支援で40万前後の単発→継続支援で月5万（AI社員のメンテナンス料の位置づけで断られにくい）→信頼が乗れば月15〜30万。会社の規模が大きくなれば契約規模も大きくなります。<br><br>▸ 高単価は珍しい？<br>対面で信頼構築ができれば、高単価契約は珍しくありません。", "src": "第5回・第7回", "st": "確定"}, {"no": 20, "cat": "D 価格・お金", "q": "『高い』と言われた時のROIの考え方・返し方は？ て、創業し立てでも使える枠が増えています。", "src": "補助金ライブ", "st": "確定"}, {"no": 46, "cat": "E 補助金", "q": "AI導入に使える補助金はありますか？（旧・IT導入補助金）", "a": "あります。以前の『IT導入補助金』が今は『AI補助金』に名前が変わっています。補助率は2/3〜3/4（約60〜75%）。<br><br>▸ どうやって使う？<br>提供側（あなたの会社）が事前に『ベンダー登録』をして、カタログに商品を載せておきます。ユーザーがそれを選んで買うときに補助が使えます（事前登録の一手間が必要）。<br><br>▸ Claude Codeはベンダー販売の商品じゃないけど大丈夫？<br>大丈夫です。取り扱い窓口として、初期設定・使い方指導などをパックにし、ランニングコストを包括すれば対象にできます。月額のツールでも最大2年分のランニングが対象になることがあります。<br><br>▸ 例えば？<br>月2万円のClaude Code＋コンサル50万円で計75万円、といったパッケージの2/3が後から戻る、という設計も可能。100万円の商品を実質40万円で買える見せ方ができ、受注しやすくなります。", "src": "補助金ライブ／第7回", "st": "確定"}, {"no": 47, "cat": "E 補助金", "q": "補助金の知識がない自分でも提案できますか？社労士・行政書士がいないと無理では？", "a": "必要ありません。<br><br>▸ 士業の位置づけは？<br>今年から、補助金は行政書士、助成金は社会保険労務士が窓口とされていますが、それは“代理申請・代理作成”のポジションです。<br><br>▸ 私たち（コンサル）はどう動く？<br>『代理で書かない』立場で動きます。社長ご自身に申請してもらい、Zoomで画面共有しながら一緒に作るポジションなら、社労士・行政書士の先生がいなくてもサポートできます。電子申請が主流なので、添付ミスなどもその場で一緒に確認しながら進められます。<br><br>▸ 困ったら？<br>園田さんのチームにChatworkで相談できます。<br><a href=\"https://www.youtube.com/watch?v=Wasd6_LAkt4\" target=\"_blank\" rel=\"noopener\">▶ 補助金最前線セミナー（園田芽衣さん×田中／動画・約1時間）</a>", "src": "補助金ライブ", "st": "確定"}, {"no": 48, "cat": "E 補助金", "q": "自分で申請するのと、プロに頼むのは何が違いますか？", "a": "違いは『審査側の目線が分かるかどうか』です。<br><br>▸ 同じAIで書いてもダメ？<br>同じChatGPT等で事業計画を書いても、プロが書かせる内容と素人が書く内容では完成度が全く違います。特に差が出るのが『新規性』と『再現性』。再現性（その経営者が本当にやれる内容になっているか）で人間らしさ・実現性が問われます。<br><br>▸ どうすればいい？<br>自分で作って、プロに添削してもらうだけでも採択精度は上がります。講座では園田さん監修のツール（“にゃーご”）で、通常40時間かかる事業計画を約1時間で作れる仕組みも使えます。", "src": "補助金ライブ", "st": "確定"}, {"no": 49, "cat": "E 補助金", "q": "補助金が使える提案は、最初から言ったほうがいいですか？", "a": "言ったほうがいいです。『補助金を使ってお手伝いします』と最初から伝えると、お金のハードルがグッと下がります。社長さんはお得な話が好きなので、初めから出してOK。<br><br>▸ どれくらい効く？<br>園田さんいわく、補助金対象だと伝えるだけで『キャッシュフローが…』『家族に相談が…』といった断り文句を一掃できる“裏技”になります。実際、業務用冷蔵庫の例では、300万円を買おうとしていた人が『500万円戻るなら』と600万円の大きい方を即決した、という話も。", "src": "補助金ライブ／第7回", "st": "確定"}, {"no": 50, "cat": "E 補助金", "q": "補助金コンサルの報酬・手数料の相場は？", "a": "一般には『着手金＋成功報酬』が基本です（外部依頼だと成功報酬20〜30%という話も）。<br><br>▸ 専属でやると？<br>顧問契約なら固定費（ベースのお給料的な固定費）＋成功報酬で、申請を出すほど積み上がり、2ヶ月に1回ボーナスがあるような形にな
